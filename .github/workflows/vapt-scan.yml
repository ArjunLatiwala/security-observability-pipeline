name: Step 4 & 5 - Performance & Error Tracking (Wazuh Paused)

on:
  workflow_dispatch:

env:
  TARGET_URL: 'https://husaintrivedi.site'

jobs:
  # ==========================================
  # STEP 4: Security Scan (Wazuh skipped for now)
  # ==========================================
  security_scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: OWASP ZAP Full Scan
        uses: zaproxy/action-full-scan@v0.12.0
        with:
          target: ${{ env.TARGET_URL }}
          fail_action: false
          cmd_options: '-a -j -r report_html.html -J report_json.json'

      # WAZUH IS COMMENTED OUT UNTIL FIREWALL IS OPEN
      # - name: Push Event to Wazuh
      #   run: echo "Wazuh server is currently unreachable. Skipping..."

      - name: Upload Security Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vapt-report
          path: |
            report_html.html
            report_json.json

  # ==========================================
  # STEP 5: Benchmarking + Sentry Active
  # ==========================================
  benchmarking:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code 
        uses: actions/checkout@v4

      - name: Setup Tools
        run: |
          sudo apt-get update && sudo apt-get install -y apache2-utils jq
          curl -fsSL https://dl.k6.io/key.gpg | sudo gpg --dearmor -o /usr/share/keyrings/k6-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update && sudo apt-get install -y k6

      - name: Apache Bench Stress
        run: ab -n 500 -c 10 ${{ env.TARGET_URL }}/ | tee stress-results.txt

      - name: Create k6 script
        run: |
          cat << 'EOF' > k6-test.js
          import http from 'k6/http';
          import { sleep, check } from 'k6';
          export const options = { 
            vus: 10, duration: '10s',
            thresholds: { 'http_req_duration': ['p(98)<10'] } 
          };
          export default function () {
            let res = http.get('${{ env.TARGET_URL }}'); 
            check(res, { 'status is 200': (r) => r.status === 200 });
            sleep(1);
          }
          EOF

      - name: Run k6 Cloud Test
        run: |
          k6 run --out cloud \
          --tag product_id="${{ secrets.DEFECTDOJO_PRODUCT_ID }}" \
          k6-test.js
        env:
          K6_CLOUD_TOKEN: ${{ secrets.K6_CLOUD_TOKEN }}
          K6_CLOUD_PROJECT_ID: 7324608
          K6_CLOUD_NAME: "${{ github.event.repository.name }}"

      # ✅ SENTRY IS NOW FULLY ACTIVE
      # This will create an error in Sentry ONLY if k6 fails (latency > 2s)
      - name: Report Failure to Sentry
        if: failure()
        run: |
          curl -s -X POST "https://sentry.io/api/0/projects/creole-studios-xj/security-observability-pipeline/issues/" \
          -H "Authorization: Bearer ${{ secrets.SENTRY_AUTH_TOKEN }}" \
          -H "Content-Type: application/json" \
          -d '{
            "title": "Performance Failure: ${{ github.event.repository.name }}",
            "message": "Latency threshold exceeded for Product ID ${{ secrets.DEFECTDOJO_PRODUCT_ID }}",
            "level": "error",
            "tags": { 
              "repo": "${{ github.event.repository.name }}",
              "product_id": "${{ secrets.DEFECTDOJO_PRODUCT_ID }}"
            }
          }'

      - name: Upload Performance Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: live-site-performance-logs
          path: |
            stress-results.txt
            k6-test.js
