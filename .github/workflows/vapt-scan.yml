name: Step 4 & 5 - Final Scalable Enterprise Architecture

on:
  workflow_dispatch:

env:
  TARGET_URL: 'https://husaintrivedi.site'
  WAZUH_INDEXER_URL: 'https://35.200.203.148:8080'
  WAZUH_MANAGER_URL: 'https://35.200.203.148:55000'
  # --- INTENTIONAL FAILURES FOR DEMO ---
  LATENCY_THRESHOLD: 10          # Fail: Real latency > 10ms
  EXPECTED_STATUS: 201           # Fail: Site is 200, we want 201
  ERROR_RATE_LIMIT: 0.0001       # Fail: Tiny threshold

jobs:
  # ==========================================
  # NEW JOB: Observability Provisioning
  # ==========================================
  provision_monitoring:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H 35.200.203.148 >> ~/.ssh/known_hosts

      - name: Auto-Configure Infrastructure Monitoring
        run: |
          ssh husaintrivedi@35.200.203.148 << 'EOF'
            echo "--- Starting Infrastructure Observability Setup ---"
            
            # 1. GRAFANA ALLOY (Infrastructure Metrics & Logs)
            if command -v alloy &> /dev/null; then
              echo "✅ Grafana Alloy (Infra Monitor) already active."
            else
              echo "⚠️ Installing Grafana Alloy to monitor Server Vitals..."
              sudo mkdir -p /etc/apt/keyrings/
              curl -fsSL https://apt.grafana.com/gpg.key | gpg --dearmor | sudo tee /etc/apt/keyrings/grafana.gpg > /dev/null
              echo "deb [signed-by=/etc/apt/keyrings/grafana.gpg] https://apt.grafana.com stable main" | sudo tee /etc/apt/sources.list.d/grafana.list
              sudo apt-get update && sudo apt-get install -y alloy
              sudo systemctl enable --now alloy
            fi

            # 2. SENTRY SIMULATION (Application Error Tracking)
            DUMMY_PROJECT_DIR="/home/husaintrivedi/simulated-project"
            sudo mkdir -p $DUMMY_PROJECT_DIR
            if [ -f "$DUMMY_PROJECT_DIR/.env" ]; then
              echo "✅ Sentry metadata already present in simulated project."
            else
              echo "⚠️ Injecting Sentry DSN into simulated project environment..."
              echo "SENTRY_DSN=${{ secrets.SENTRY_DSN }}" | sudo tee $DUMMY_PROJECT_DIR/.env
              echo "✅ Sentry bridge established."
            fi

            # 3. WAZUH AGENT (Security Auditing)
            if systemctl is-active --quiet wazuh-agent; then
              echo "✅ Wazuh Security Agent is guarding the host."
            else
              echo "⚠️ Wazuh Agent missing. Preparing server for security enrollment..."
            fi
          EOF

  # ==========================================
  # JOB 1: STEP 4 - Deep Security (VAPT)
  # ==========================================
  security_vapt_job:
    needs: provision_monitoring
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: OWASP ZAP Full Scan
        uses: zaproxy/action-full-scan@v0.12.0
        with:
          target: ${{ env.TARGET_URL }}
          fail_action: false          
          cmd_options: '-a -j -r report_html.html -J report_json.json'

      - name: Analyse ZAP Results and Log to Wazuh
        if: always()
        run: |
          TIMESTAMP=$(TZ='Asia/Kolkata' date +"%Y-%m-%d %H:%M IST")
          if [ ! -f report_json.json ]; then
            ZAP_STATUS="error"
            REPORT="CRITICAL: ZAP failed to generate report."
            HIGH=0; MEDIUM=0; LOW=0; INFO=0; TOTAL_ALERTS=0
          else
            HIGH=$(jq '[.site[]?.alerts[]? | select(.riskcode == "3")] | length' report_json.json 2>/dev/null || echo 0)
            MEDIUM=$(jq '[.site[]?.alerts[]? | select(.riskcode == "2")] | length' report_json.json 2>/dev/null || echo 0)
            LOW=$(jq '[.site[]?.alerts[]? | select(.riskcode == "1")] | length' report_json.json 2>/dev/null || echo 0)
            INFO=$(jq '[.site[]?.alerts[]? | select(.riskcode == "0")] | length' report_json.json 2>/dev/null || echo 0)
            TOTAL_ALERTS=$(jq '[.site[]?.alerts[]?] | length' report_json.json 2>/dev/null || echo 0)

            if [ "$TOTAL_ALERTS" -lt 2 ]; then
              ZAP_STATUS="blocked"; REPORT="WARNING: Site may be protected by WAF."
            elif [ "$HIGH" -gt 0 ]; then
              ZAP_STATUS="vulnerable"; REPORT="CRITICAL VULNERABILITIES FOUND: ${HIGH} High detected."
            else
              ZAP_STATUS="clean"; REPORT="PASS: No High/Medium vulnerabilities detected."
            fi
          fi
          curl -k -s -X POST "${{ env.WAZUH_INDEXER_URL }}/pipeline-audit/_doc/" \
            -u "admin:${{ secrets.WAZUH_INDEXER_PASSWORD }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"timestamp\": \"$TIMESTAMP\",
              \"event_type\": \"SECURITY_VAPT_SCAN\",
              \"product_id\": \"${{ secrets.DEFECTDOJO_PRODUCT_ID }}\",
              \"repo\": \"${{ github.event.repository.name }}\",
              \"status\": \"$ZAP_STATUS\",
              \"breach_details\": \"$REPORT\",
              \"run_url\": \"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"
            }"
          if [ "$ZAP_STATUS" = "vulnerable" ] || [ "$ZAP_STATUS" = "error" ]; then exit 1; fi

      - name: Upload Security Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vapt-reports
          path: |
            report_html.html
            report_json.json

  # ==========================================
  # JOB 2: STEP 5 - Benchmarking + Sentry
  # ==========================================
  benchmarking_job:
    needs: provision_monitoring
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Create Sentry Release
        run: |
          PREVIOUS_COMMIT=$(git rev-parse HEAD~1 2>/dev/null || echo "")
          curl -X POST "https://sentry.io/api/0/organizations/creole-studios-xj/releases/" \
            -H "Authorization: Bearer ${{ secrets.SENTRY_AUTH_TOKEN }}" \
            -H 'Content-Type: application/json' \
            -d "{
              \"version\": \"${{ github.sha }}\",
              \"projects\": [\"security-observability-pipeline\"],
              \"refs\": [{
                \"repository\": \"${{ github.repository }}\",
                \"commit\": \"${{ github.sha }}\",
                \"previousCommit\": \"${PREVIOUS_COMMIT}\"
              }]
            }"

      - name: Setup Tools (k6, jq, Apache Bench)
        run: sudo apt-get update && sudo apt-get install -y apache2-utils jq curl

      - name: Install k6
        run: |
          curl -fsSL https://dl.k6.io/key.gpg | sudo gpg --dearmor -o /usr/share/keyrings/k6-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update && sudo apt-get install -y k6

      - name: Run Apache Bench Stress Test
        run: ab -n 500 -c 10 ${{ env.TARGET_URL }}/ | tee stress-results.txt

      - name: Run k6 Load Test
        id: k6_run
        run: |
          cat << 'EOF' > k6-test.js
          import http from 'k6/http';
          import { check } from 'k6';
          export const options = { 
            iterations: 50,
            thresholds: { 
              'http_req_duration':['p(95)<' + __ENV.LATENCY_LIMIT],
              'http_req_failed':['rate<' + __ENV.ERROR_LIMIT],
              'checks': ['rate==1.0']
            } 
          };
          export default function () { 
            const res = http.get(__ENV.MY_URL);
            check(res, { 'status_is_correct': (r) => r.status === parseInt(__ENV.EXPECTED_ST) });
          }
          EOF
          k6 run --out cloud --summary-export=result.json k6-test.js
        env:
          MY_URL: ${{ env.TARGET_URL }}
          LATENCY_LIMIT: ${{ env.LATENCY_THRESHOLD }}
          ERROR_LIMIT: ${{ env.ERROR_RATE_LIMIT }}
          EXPECTED_ST: ${{ env.EXPECTED_STATUS }}
          K6_CLOUD_TOKEN: ${{ secrets.K6_CLOUD_TOKEN }}
          K6_CLOUD_PROJECT_ID: 7324608
          K6_CLOUD_NAME: "${{ github.event.repository.name }}"
          
      - name: Log Performance Audit to Wazuh Indexer
        if: always()
        env:
          WAZUH_INDEXER_URL: ${{ env.WAZUH_INDEXER_URL }}
          WAZUH_INDEXER_PASSWORD: ${{ secrets.WAZUH_INDEXER_PASSWORD }}
          DEFECTDOJO_PRODUCT_ID: ${{ secrets.DEFECTDOJO_PRODUCT_ID }}
          REPO_NAME: ${{ github.event.repository.name }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          LATENCY_THRESHOLD: ${{ env.LATENCY_THRESHOLD }}
          ERROR_RATE_LIMIT: ${{ env.ERROR_RATE_LIMIT }}
          EXPECTED_STATUS: ${{ env.EXPECTED_STATUS }}
        run: |
          python3 - <<'PYEOF'
          import json, os, datetime, urllib.request, ssl, base64, traceback, sys
          try:
              result_path = 'result.json'
              if os.path.exists(result_path):
                  with open(result_path) as f: d = json.load(f)
                  m = d['metrics']; r = d['root_group']
                  actual_lat  = int(m['http_req_duration']['values']['p(95)'])
                  actual_err  = float(m['http_req_failed']['values']['rate'])
                  check_fails = int(r['checks']['status_is_correct']['fails'])
                  lat_limit   = int(os.environ['LATENCY_THRESHOLD'])
                  err_limit   = float(os.environ['ERROR_RATE_LIMIT'])
                  expected_st = os.environ['EXPECTED_STATUS']
                  report = "AUDIT DETAILS:"
                  if actual_lat > lat_limit: report += f" | LATENCY BREACH: Observed {actual_lat}ms"
                  if actual_err > err_limit: report += f" | RELIABILITY FAIL: Error rate {actual_err:.4f}"
                  if check_fails > 0: report += f" | STATUS MISMATCH: {check_fails} failures"
                  if report == "AUDIT DETAILS:":
                      report = "PASS: All metrics within industry thresholds."
                      audit_status = "success"
                  else: audit_status = "failure"
              else:
                  actual_lat, actual_err, check_fails = 0, 0.0, 0
                  report = "CRITICAL: No result.json found."
                  audit_status = "failure"
              ist_time = datetime.datetime.utcnow() + datetime.timedelta(hours=5, minutes=30)
              timestamp_ist = ist_time.strftime('%Y-%m-%d %H:%M IST')
              payload = {
                  "timestamp": timestamp_ist, "event_type": "PERFORMANCE_AUDIT",
                  "product_id": os.environ['DEFECTDOJO_PRODUCT_ID'], "repo": os.environ['REPO_NAME'],
                  "status": audit_status, "breach_details": report, "run_url": os.environ['RUN_URL']
              }
              url = os.environ['WAZUH_INDEXER_URL'] + '/pipeline-audit/_doc/'
              auth = base64.b64encode(f"admin:{os.environ['WAZUH_INDEXER_PASSWORD']}".encode()).decode()
              req = urllib.request.Request(url, data=json.dumps(payload).encode(), headers={'Content-Type': 'application/json', 'Authorization': f'Basic {auth}'}, method='POST')
              ctx = ssl._create_unverified_context()
              with urllib.request.urlopen(req, context=ctx) as resp: print(resp.read().decode())
              with open(os.environ['GITHUB_ENV'], 'a') as f_env:
                  f_env.write(f"AUDIT_STATUS={audit_status}\nAUDIT_REPORT={report}\nACTUAL_LAT={actual_lat}\n")
          except Exception as e:
              sys.exit(1)
          PYEOF

      - name: Send Google Chat Alert on Failure
        if: failure()
        run: |
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          TIMESTAMP=$(TZ='Asia/Kolkata' date +"%Y-%m-%d %H:%M IST")
          MESSAGE=$(printf '🚨 *CRITICAL: PIPELINE FAILURE DETECTED*\n📂 Repository: %s\n🆔 Product ID: %s\n⚠️ *Failure Analysis:*\n%s\n🔗 Action: %s' \
            "${{ github.event.repository.name }}" \
            "${{ secrets.DEFECTDOJO_PRODUCT_ID }}" \
            "$AUDIT_REPORT" \
            "$RUN_URL")
          jq -n --arg text "$MESSAGE" '{"text": $text}' | \
            curl -s -X POST "https://chat.googleapis.com/v1/${{ secrets.GCHAT_SPACE_ID }}" \
              -H "Content-Type: application/json" \
              -d @-
          exit 1
              
      - name: Report Failure to Sentry
        if: failure()
        run: |
          DSN="${{ secrets.SENTRY_DSN }}"
          SENTRY_KEY=$(echo "$DSN" | sed 's|https://||' | cut -d'@' -f1)
          SENTRY_HOST=$(echo "$DSN" | cut -d'@' -f2 | cut -d'/' -f1)
          PROJECT_ID=$(echo "$DSN" | rev | cut -d'/' -f1 | rev)
          curl -X POST "https://$SENTRY_HOST/api/$PROJECT_ID/store/" \
            -H "X-Sentry-Auth: Sentry sentry_version=7, sentry_key=$SENTRY_KEY, sentry_client=curl/1.0" \
            -H 'Content-Type: application/json' \
            -d "{
              \"message\": \"Pipeline Failure: ${{ github.event.repository.name }}\",
              \"level\": \"error\",
              \"release\": \"${{ github.sha }}\",
              \"tags\": {
                \"repo\": \"${{ github.event.repository.name }}\",
                \"product_id\": \"${{ secrets.DEFECTDOJO_PRODUCT_ID }}\"
              }
            }"

      - name: Upload Benchmarking Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: performance-logs
          path: |
            stress-results.txt
            result.json
            k6-test.js
