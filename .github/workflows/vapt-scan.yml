name: Step 4 & 5 - Security & Benchmarking Pipeline

on:
  workflow_dispatch:

# Fixes the 403 error by giving the runner permission to write reports/issues
permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  vapt_benchmarking_job:
    runs-on: ubuntu-latest
    
    services:
      staging-app:
        image: bkimminich/juice-shop
        ports:
          - 3000:3000

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Wait for Staging App
        run: |
          echo "Waiting for Juice Shop to start..."
          until $(curl --output /dev/null --silent --head --fail http://localhost:3000); do
            printf '.'
            sleep 5
          done

      # ==========================================
      # STEP 4: DEEP SECURITY (VAPT)
      # ==========================================
      - name: OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline-scan@v0.12.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          target: 'http://localhost:3000/'
          fail_action: false 

      - name: Upload Security Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vapt-report
          path: 'report_html.html'

      # ==========================================
      # STEP 5: BENCHMARKING (Load & Stress)
      # ==========================================
      
      - name: Install Apache Bench
        run: sudo apt-get update && sudo apt-get install -y apache2-utils

      - name: Run Apache Bench Stress Test
        run: ab -n 500 -c 10 http://localhost:3000/ | tee stress-results.txt

      - name: Create k6 script
        run: |
          echo "import http from 'k6/http';
          import { sleep, check } from 'k6';
          export const options = { 
            vus: 10, 
            duration: '10s',
            thresholds: { http_req_duration: ['p(95)<500'] } 
          };
          export default function () {
            let res = http.get('http://localhost:3000');
            check(res, { 'status is 200': (r) => r.status === 200 });
            sleep(1);
          }" > k6-test.js

      - name: Run k6 Load Test
        uses: grafana/k6-action@v0.3.1
        with:
          filename: k6-test.js

      - name: Upload Benchmarking Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: performance-benchmarks
          path: |
            stress-results.txt
            k6-test.js
