name: Step 4 & 5 - Final Scalable Enterprise Architecture

on:
  workflow_dispatch:

env:
  TARGET_URL: 'https://husaintrivedi.site'
  WAZUH_INDEXER_URL: 'https://35.200.203.148:8080'
  WAZUH_MANAGER_URL: 'https://35.200.203.148:55000'
  # --- INTENTIONAL FAILURES FOR DEMO ---
  LATENCY_THRESHOLD: '10'         # Real site is >10ms (Fix: set to 2000)
  EXPECTED_STATUS: '201'          # Site returns 200 (Fix: set to 200)
  ERROR_RATE_LIMIT: '0.0001'      # Zero tolerance (Fix: set to 0.01)

jobs:
  # ==========================================
  # JOB 1: STEP 4 - Deep Security (VAPT)
  # ==========================================
  security_vapt_job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: OWASP ZAP Full Scan
        uses: zaproxy/action-full-scan@v0.12.0
        with:
          target: ${{ env.TARGET_URL }}
          fail_action: false
          cmd_options: '-a -j -r report_html.html -J report_json.json'

      - name: Log Security Audit to Wazuh Indexer
        if: always()
        continue-on-error: true
        run: |
          TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          curl -k -s -X POST "${{ env.WAZUH_INDEXER_URL }}/pipeline-audit/_doc/" \
            -u "admin:${{ secrets.WAZUH_INDEXER_PASSWORD }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"timestamp\": \"$TIMESTAMP\",
              \"event_type\": \"SECURITY_VAPT_SCAN\",
              \"product_id\": \"${{ secrets.DEFECTDOJO_PRODUCT_ID }}\",
              \"repo\": \"${{ github.event.repository.name }}\",
              \"status\": \"${{ job.status }}\",
              \"run_url\": \"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"
            }"

  # ==========================================
  # JOB 2: STEP 5 - Benchmarking + Sentry
  # ==========================================
  benchmarking_job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Tools (k6 & jq)
        run: sudo apt-get update && sudo apt-get install -y jq curl

      - name: Install k6
        run: |
          curl -fsSL https://dl.k6.io/key.gpg | sudo gpg --dearmor -o /usr/share/keyrings/k6-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update && sudo apt-get install -y k6

      - name: Run k6 Load Test
        id: k6_run
        run: |
          cat << EOF > k6-test.js
          import http from 'k6/http';
          import { check } from 'k6';
          export const options = { 
            thresholds: { 
              'http_req_duration': ['p(98)<${{ env.LATENCY_THRESHOLD }}'],
              'http_req_failed': ['rate<${{ env.ERROR_RATE_LIMIT }}'] 
            } 
          };
          export default function () { 
            const res = http.get('${{ env.TARGET_URL }}');
            check(res, {
              'is status ${{ env.EXPECTED_STATUS }}': (r) => r.status === parseInt('${{ env.EXPECTED_STATUS }}'),
              'body has content': (r) => r.body.length > 0,
            });
          }
          EOF
          # ADDED --summary-export FLAG BELOW
          k6 run --summary-export=result.json k6-test.js

      - name: Log Performance Audit to Wazuh Indexer
        if: always()
        run: |
          TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          curl -k -s -X POST "${{ env.WAZUH_INDEXER_URL }}/pipeline-audit/_doc/" \
            -u "admin:${{ secrets.WAZUH_INDEXER_PASSWORD }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"timestamp\": \"$TIMESTAMP\",
              \"event_type\": \"PERFORMANCE_BENCHMARK\",
              \"product_id\": \"${{ secrets.DEFECTDOJO_PRODUCT_ID }}\",
              \"repo\": \"${{ github.event.repository.name }}\",
              \"status\": \"${{ job.status }}\",
              \"run_url\": \"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"
            }"

      - name: Trigger Wazuh Alert via API (Comprehensive)
        if: failure()
        run: |
          # 1. Extract values safely
          ACTUAL_P98=$(jq '.metrics.http_req_duration.values."p(98)"' result.json | cut -d. -f1 || echo "0")
          ACTUAL_ERR=$(jq '.metrics.http_req_failed.values.rate' result.json || echo "0")
          STATUS_FAIL=$(jq '.metrics.checks.values.fails' result.json || echo "0")

          # 2. Build Analysis (Single-quoted to handle spaces in Python)
          BREACHES=""
          if [ "$ACTUAL_P98" -gt "${{ env.LATENCY_THRESHOLD }}" ]; then 
            BREACHES="${BREACHES}• *Latency:* ${ACTUAL_P98}ms (Limit ${{ env.LATENCY_THRESHOLD }}ms) - Website is too slow for users, resulting in a degraded experience. "
          fi
          if [ "$ACTUAL_ERR" != "0" ]; then
            BREACHES="${BREACHES}• *Errors:* Detected (Limit ${{ env.ERROR_RATE_LIMIT }}) - Server is unstable and may be dropping connections. "
          fi
          if [ "$STATUS_FAIL" -gt 0 ]; then
            BREACHES="${BREACHES}• *Status:* Found 200 (Expected ${{ env.EXPECTED_STATUS }}) - Server is alive but returned an incorrect status code. "
          fi

          # 3. Get Token
          TOKEN=$(curl -u "wazuh-wui:MyS3cr37P450r.*-" -k -s -X POST "https://35.200.203.148:55000/security/user/authenticate" | jq -r .data.token)
          
          # 4. Send Trigger (Notice the single quotes around $BREACHES)
          curl -k -s -X POST "https://35.200.203.148:55000/events" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d "{
              \"events\": [
                \"PIPELINE_ALERT_TRIGGER: repo=${{ github.event.repository.name }} type=Benchmarking prod_id=${{ secrets.DEFECTDOJO_PRODUCT_ID }} breaches='${BREACHES}' space_id=${{ secrets.GCHAT_SPACE_ID }} url=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"
              ]
            }"
          exit 1

      - name: Report Failure to Sentry
        if: failure()
        run: |
          DSN="${{ secrets.SENTRY_DSN }}"
          SENTRY_KEY=$(echo $DSN | awk -F'[:@/]' '{print $4}')
          SENTRY_HOST=$(echo $DSN | awk -F'[:@/]' '{print $5}')
          PROJECT_ID=$(echo $DSN | awk -F'[:@/]' '{print $6}')
          curl -X POST "https://$SENTRY_HOST/api/$PROJECT_ID/store/" \
          -H "X-Sentry-Auth: Sentry sentry_version=7, sentry_key=$SENTRY_KEY, sentry_client=curl/1.0" \
          -H 'Content-Type: application/json' \
          -d "{\"message\": \"Regression: ${{ github.event.repository.name }}\", \"level\": \"error\"}"

      - name: Upload Benchmarking Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: performance-logs
          path: |
            result.json
            k6-test.js
