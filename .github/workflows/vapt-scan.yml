    steps:
      - name: Checkout Code
        uses: actions/checkout@v4 # Updated to v4

      - name: Wait for Staging App to be Ready
        run: |
          echo "Waiting for application to start..."
          until $(curl --output /dev/null --silent --head --fail http://localhost:3000); do
            printf '.'
            sleep 5
          done
          echo "App is UP!"

      - name: OWASP ZAP Full Scan
        uses: zaproxy/action-full-scan@v0.12.0 # Updated to a newer stable version
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          target: 'http://localhost:3000/'
          cmd_options: '-a'

      - name: Upload Security Report
        if: always() 
        uses: actions/upload-artifact@v4 # Updated to v4
        with:
          name: vapt-report
          path: 'report_html.html'

      # Generate the "VAPT Report" artifact mentioned in your diagram
      - name: Upload Security Report
        if: always() # Run even if the scan finds vulnerabilities
        uses: actions/upload-artifact@v3
        with:
          name: vapt-report
