name: Step 4 & 5 - Final Scalable Enterprise Architecture

on:
  workflow_dispatch:

env:
  TARGET_URL: 'https://husaintrivedi.site'
  LATENCY_THRESHOLD: '10'
  WAZUH_INDEXER_URL: 'https://35.200.203.148:8080'
  WAZUH_MANAGER_URL: 'https://35.200.203.148:55000'

jobs:
  # ==========================================
  # JOB 1: STEP 4 - Deep Security (VAPT)
  # ==========================================
  security_vapt_job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: OWASP ZAP Full Scan
        uses: zaproxy/action-full-scan@v0.12.0
        with:
          target: ${{ env.TARGET_URL }}
          fail_action: false
          cmd_options: '-a -j -r report_html.html -J report_json.json'

      - name: Log Security Audit to Wazuh Indexer
        if: always()
        continue-on-error: true
        run: |
          TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          RESPONSE=$(curl -k -s --connect-timeout 10 --max-time 15 \
            -X POST "${{ env.WAZUH_INDEXER_URL }}/pipeline-audit/_doc/" \
            -u "admin:${{ secrets.WAZUH_INDEXER_PASSWORD }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"timestamp\": \"$TIMESTAMP\",
              \"event_type\": \"SECURITY_VAPT_SCAN\",
              \"product_id\": \"${{ secrets.DEFECTDOJO_PRODUCT_ID }}\",
              \"repo\": \"${{ github.event.repository.name }}\",
              \"status\": \"${{ job.status }}\",
              \"run_url\": \"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"
            }")
          echo "Wazuh response: $RESPONSE"

      - name: Upload Security Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vapt-reports
          path: |
            report_html.html
            report_json.json
            
      - name: Trigger Wazuh Alert via API (Security Fail)
        if: failure()
        run: |
          # 1. Get Authentication Token
          TOKEN=$(curl -u "wazuh-wui:MyS3cr37P450r.*-" -k -s -X POST "${{ env.WAZUH_MANAGER_URL }}/security/user/authenticate" | jq -r .data.token)
          
          # 2. Send the Failure Event (Corrected format: Array of Strings)
          curl -k -s -X POST "${{ env.WAZUH_MANAGER_URL }}/events" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d "{
              \"events\": [
                \"PIPELINE_ALERT_TRIGGER: repo=${{ github.event.repository.name }} status=failure space_id=${{ secrets.GCHAT_SPACE_ID }} url=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"
              ]
            }"

  # ==========================================
  # JOB 2: STEP 5 - Benchmarking + Sentry
  # ==========================================
  benchmarking_job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Tools (k6 & AB)
        run: |
          sudo apt-get update && sudo apt-get install -y apache2-utils jq
          curl -fsSL https://dl.k6.io/key.gpg | sudo gpg --dearmor -o /usr/share/keyrings/k6-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update && sudo apt-get install -y k6

      - name: Run Apache Bench Stress Test
        run: ab -n 500 -c 10 ${{ env.TARGET_URL }}/ | tee stress-results.txt

      - name: Run k6 Load Test
        run: |
          cat << EOF > k6-test.js
          import http from 'k6/http';
          export const options = { thresholds: { 'http_req_duration': ['p(98)<${{ env.LATENCY_THRESHOLD }}'] } };
          export default function () { http.get('${{ env.TARGET_URL }}'); }
          EOF
          k6 run --out cloud --tag product_id="${{ secrets.DEFECTDOJO_PRODUCT_ID }}" k6-test.js
        env:
          K6_CLOUD_TOKEN: ${{ secrets.K6_CLOUD_TOKEN }}
          K6_CLOUD_PROJECT_ID: 7324608
          K6_CLOUD_NAME: "${{ github.event.repository.name }}"

      - name: Log Performance Audit to Wazuh Indexer
        if: always()
        continue-on-error: true
        run: |
          TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          K6_STATUS="${{ job.status }}"
          RESPONSE=$(curl -k -s --connect-timeout 10 --max-time 15 \
            -X POST "${{ env.WAZUH_INDEXER_URL }}/pipeline-audit/_doc/" \
            -u "admin:${{ secrets.WAZUH_INDEXER_PASSWORD }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"timestamp\": \"$TIMESTAMP\",
              \"event_type\": \"PERFORMANCE_BENCHMARK\",
              \"product_id\": \"${{ secrets.DEFECTDOJO_PRODUCT_ID }}\",
              \"repo\": \"${{ github.event.repository.name }}\",
              \"status\": \"$K6_STATUS\",
              \"threshold\": \"${{ env.LATENCY_THRESHOLD }}ms\",
              \"run_url\": \"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"
            }")
          echo "Wazuh response: $RESPONSE"

      - name: Trigger Wazuh Alert via API (Performance Fail)
        if: failure()
        run: |
          # 1. Get Authentication Token
          TOKEN=$(curl -u "wazuh-wui:MyS3cr37P450r.*-" -k -s -X POST "${{ env.WAZUH_MANAGER_URL }}/security/user/authenticate" | jq -r .data.token)
          
          # 2. Send the Failure Event (Corrected format: Array of Strings)
          curl -k -s -X POST "${{ env.WAZUH_MANAGER_URL }}/events" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d "{
              \"events\": [
                \"PIPELINE_ALERT_TRIGGER: repo=${{ github.event.repository.name }} status=failure space_id=${{ secrets.GCHAT_SPACE_ID }} url=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"
              ]
            }"

      - name: Report Failure to Sentry
        if: failure()
        run: |
          DSN="${{ secrets.SENTRY_DSN }}"
          SENTRY_KEY=$(echo $DSN | awk -F'[:@/]' '{print $4}')
          SENTRY_HOST=$(echo $DSN | awk -F'[:@/]' '{print $5}')
          PROJECT_ID=$(echo $DSN | awk -F'[:@/]' '{print $6}')

          curl -X POST "https://$SENTRY_HOST/api/$PROJECT_ID/store/" \
          -H "X-Sentry-Auth: Sentry sentry_version=7, sentry_key=$SENTRY_KEY, sentry_client=curl/1.0" \
          -H 'Content-Type: application/json' \
          -d "{
            \"message\": \"Performance Regression: ${{ github.event.repository.name }}\",
            \"exception\": {
              \"values\": [{
                \"type\": \"PerformanceThresholdError\",
                \"value\": \"Threshold of ${{ env.LATENCY_THRESHOLD }}ms failed for Product ID: ${{ secrets.DEFECTDOJO_PRODUCT_ID }}.\"
              }]
            },
            \"level\": \"error\",
            \"fingerprint\": [\"${{ github.event.repository.name }}\", \"perf-failure\"],
            \"tags\": {
              \"repo\": \"${{ github.event.repository.name }}\",
              \"product_id\": \"${{ secrets.DEFECTDOJO_PRODUCT_ID }}\"
            }
          }"

      - name: Upload Benchmarking Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: performance-logs
          path: |
            stress-results.txt
            k6-test.js
