name: Step 4 & 5 - Final Scalable Enterprise Architecture

on:
  workflow_dispatch:

env:
  TARGET_URL: 'https://husaintrivedi.site'
  WAZUH_INDEXER_URL: 'https://35.200.203.148:8080'
  WAZUH_MANAGER_URL: 'https://35.200.203.148:55000'
  # --- INTENTIONAL FAILURES FOR DEMO ---
  LATENCY_THRESHOLD: 10          # Fail: Real latency > 10ms
  EXPECTED_STATUS: 201           # Fail: Site is 200, we want 201
  ERROR_RATE_LIMIT: 0.0001       # Fail: Tiny threshold

jobs:
  security_vapt_job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: OWASP ZAP Full Scan
        uses: zaproxy/action-full-scan@v0.12.0
        with:
          target: ${{ env.TARGET_URL }}
          fail_action: false
          cmd_options: '-a -j -r report_html.html -J report_json.json'

      - name: Log Security Audit to Wazuh Indexer
        if: always()
        continue-on-error: true
        run: |
          TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          curl -k -s -X POST "${{ env.WAZUH_INDEXER_URL }}/pipeline-audit/_doc/" \
            -u "admin:${{ secrets.WAZUH_INDEXER_PASSWORD }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"timestamp\": \"$TIMESTAMP\",
              \"event_type\": \"SECURITY_VAPT_SCAN\",
              \"product_id\": \"${{ secrets.DEFECTDOJO_PRODUCT_ID }}\",
              \"repo\": \"${{ github.event.repository.name }}\",
              \"status\": \"${{ job.status }}\",
              \"run_url\": \"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"
            }"

  benchmarking_job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Tools (k6 & jq)
        run: sudo apt-get update && sudo apt-get install -y jq curl

      - name: Install k6
        run: |
          curl -fsSL https://dl.k6.io/key.gpg | sudo gpg --dearmor -o /usr/share/keyrings/k6-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update && sudo apt-get install -y k6

      - name: Run k6 Load Test
        id: k6_run
        run: |
          # We create the JS file using a safer method to avoid syntax errors
          cat << 'EOF' > k6-test.js
          import http from 'k6/http';
          import { check } from 'k6';
          export const options = { 
            thresholds: { 
              'http_req_duration': ['p(98)<' + __ENV.LATENCY_LIMIT],
              'http_req_failed': ['rate<' + __ENV.ERROR_LIMIT],
              'checks': ['rate==1.0']
            } 
          };
          export default function () { 
            const res = http.get(__ENV.MY_URL);
            check(res, { 'status_is_correct': (r) => r.status === parseInt(__ENV.EXPECTED_ST) });
          }
          EOF
          k6 run --summary-export=result.json k6-test.js
        env:
          MY_URL: ${{ env.TARGET_URL }}
          LATENCY_LIMIT: ${{ env.LATENCY_THRESHOLD }}
          ERROR_LIMIT: ${{ env.ERROR_RATE_LIMIT }}
          EXPECTED_ST: ${{ env.EXPECTED_STATUS }}

      - name: Log Performance Audit to Wazuh Indexer
        if: always()
        run: |
          TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          curl -k -s -X POST "${{ env.WAZUH_INDEXER_URL }}/pipeline-audit/_doc/" \
            -u "admin:${{ secrets.WAZUH_INDEXER_PASSWORD }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"timestamp\": \"$TIMESTAMP\",
              \"event_type\": \"PERFORMANCE_BENCHMARK\",
              \"product_id\": \"${{ secrets.DEFECTDOJO_PRODUCT_ID }}\",
              \"repo\": \"${{ github.event.repository.name }}\",
              \"status\": \"${{ job.status }}\",
              \"run_url\": \"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"
            }"
      - name: Trigger Wazuh Alert (Python Data Mode)
        if: failure()
        shell: python
        run: |
          import json, requests, os, sys

          # 1. Load k6 results safely
          try:
              with open('result.json') as f:
                  res = json.load(f)
              p98 = res['metrics']['http_req_duration']['values'].get('p(98)', 0)
              err = res['metrics']['http_req_failed']['values'].get('rate', 0)
              chk = res['metrics']['checks']['values'].get('fails', 0)
          except:
              p98, err, chk = 0, 1, 1 # Fallback for engine crash

          # 2. Build Data Object
          alert_payload = {
              "repo": "${{ github.event.repository.name }}",
              "prod_id": "${{ secrets.DEFECTDOJO_PRODUCT_ID }}",
              "actual_p98": p98,
              "limit_p98": int("${{ env.LATENCY_THRESHOLD }}"),
              "actual_err": err,
              "limit_err": float("${{ env.ERROR_RATE_LIMIT }}"),
              "status_fail": chk,
              "expected_st": "${{ env.EXPECTED_STATUS }}",
              "space_id": "${{ secrets.GCHAT_SPACE_ID }}",
              "run_url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          }

          # 3. Send to Wazuh
          auth_url = "${{ env.WAZUH_MANAGER_URL }}/security/user/authenticate"
          token = requests.post(auth_url, auth=('wazuh-wui', 'MyS3cr37P450r.*-'), verify=False).json()['data']['token']
          
          event_url = "${{ env.WAZUH_MANAGER_URL }}/events"
          headers = {"Authorization": f"Bearer {token}", "Content-Type": "application/json"}
          
          # We wrap the data in a clear marker 'JSON_PAYLOAD:'
          msg = "JSON_PAYLOAD:" + json.dumps(alert_payload)
          requests.post(event_url, headers=headers, json={"events": [msg]}, verify=False)
          sys.exit(1)
