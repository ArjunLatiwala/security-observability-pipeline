# Developer APM Runtime Guide
#
# Choose APP_RUNTIME based on the application deployed on TARGET_IP.
# Choose APP_SERVICE_NAME as the stable name you want to see in Grafana Tempo/APM as service.name.
# Examples: checkout-api, inventory-service, demo-python-app, demo-pipeline-app.
#
# ┌────────┬─────────────────────────────────────────────────────────────────┬────────────────────────────────────────────────────────────────────────┐
# │ Value  │                  Use when the deployed app is                   │                           What workflow does                           │
# ├────────┼─────────────────────────────────────────────────────────────────┼────────────────────────────────────────────────────────────────────────┤
# │ node   │ Node.js / Express / Next.js / NestJS / etc.                     │ Installs Node OpenTelemetry auto-instrumentation and sets NODE_OPTIONS │
# ├────────┼─────────────────────────────────────────────────────────────────┼────────────────────────────────────────────────────────────────────────┤
# │ python │ Python / Flask / FastAPI / Django / etc.                        │ Installs Python OpenTelemetry packages                                 │
# ├────────┼─────────────────────────────────────────────────────────────────┼────────────────────────────────────────────────────────────────────────┤
# │ none   │ App is not Node/Python, or app is already manually instrumented │ Keeps Alloy only; no automatic app instrumentation                     │
# └────────┴─────────────────────────────────────────────────────────────────┴────────────────────────────────────────────────────────────────────────┘
#
# Optional app start/restart configuration:
# - Simple mode: set APP_WORKING_DIR and APP_START_COMMAND. The workflow injects the
#   required OTEL_* env vars automatically and prefixes Python commands with
#   opentelemetry-instrument when APP_RUNTIME=python.
# - Advanced mode: set APP_RESTART_COMMAND for PM2/systemd/Docker/custom process managers.
#   If APP_RESTART_COMMAND is set, it takes precedence over simple mode.
# - node simple example: APP_START_COMMAND='node server.js'
# - python simple example: APP_START_COMMAND='.venv/bin/python app.py'
# - python FastAPI example: APP_START_COMMAND='.venv/bin/uvicorn main:app --host 0.0.0.0 --port 8000'
# - none: configure instrumentation inside the app manually, or point any supported OpenTelemetry SDK to http://localhost:4318.
#
# Grafana check:
# - Open Grafana Explore or Application Observability.
# - Select the Tempo traces data source.
# - Search for service.name matching APP_SERVICE_NAME.

name: Step 4 & 5 - Final Scalable Enterprise Architecture

on:
  workflow_dispatch:

env:
  # --- TARGET ENVIRONMENT CONFIGURATION ---
  TARGET_URL: 'https://husaintrivedi.site'
  TARGET_IP: '35.200.203.148'
  SSH_USER: 'husaintrivedi'

  # --- APPLICATION RUNTIME CONFIGURATION ---
  # APP_RUNTIME controls which OpenTelemetry setup this workflow prepares on the server.
  # Set to node for Node.js apps, python for Python apps, or none for unsupported/manual instrumentation.
  APP_RUNTIME: 'python'

  # APP_SERVICE_NAME appears in Grafana Tempo/APM as service.name.
  APP_SERVICE_NAME: ${{ github.event.repository.name }}

  # Simple app start mode. Set these when the workflow should start the app directly.
  # Python example: APP_START_COMMAND='.venv/bin/python app.py'
  # Node example: APP_START_COMMAND='node server.js'
  # The workflow adds OTEL env vars automatically and prefixes Python with opentelemetry-instrument.
  APP_WORKING_DIR: '/home/husaintrivedi/apm-test-app'
  APP_START_COMMAND: '.venv/bin/python app.py'
  APP_PORT: '3000'
  APP_LOG_FILE: '/tmp/apm-test-app.log'

  # Advanced restart mode for PM2/systemd/Docker/custom process managers.
  # If set, this command runs instead of APP_WORKING_DIR/APP_START_COMMAND simple mode.
  # Examples: pm2 restart my-app --update-env, sudo systemctl restart my-app.
  APP_RESTART_COMMAND: ''

  # --- WAZUH SERVER CONFIGURATION ---
  WAZUH_INDEXER_URL: 'https://35.200.203.148:8080'
  WAZUH_MANAGER_URL: 'https://35.200.203.148:55000'


  # --- PRODUCTION THRESHOLDS (Modify these to intentionally fail or pass) ---
  LATENCY_THRESHOLD: 10          # Fail: Real latency > 10ms (Set to 2000 for PROD)
  EXPECTED_STATUS: 201           # Fail: Site is 200 (Set to 200 for PROD)
  ERROR_RATE_LIMIT: 0.0001       # Fail: Tiny threshold (Set to 0.01 for PROD)

jobs:
  # ==========================================
  # JOB: Prepare Observability Before Tests
  # ==========================================
  provision_monitoring:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Show Selected Runtime Config
        run: |
          echo "APP_RUNTIME=${{ env.APP_RUNTIME }}"
          echo "APP_SERVICE_NAME=${{ env.APP_SERVICE_NAME }}"
          echo "APP_WORKING_DIR=${{ env.APP_WORKING_DIR }}"
          echo "APP_START_COMMAND=${{ env.APP_START_COMMAND }}"
          echo "APP_PORT=${{ env.APP_PORT }}"
          echo "APP_LOG_FILE=${{ env.APP_LOG_FILE }}"
          echo "APP_RESTART_COMMAND=${{ env.APP_RESTART_COMMAND }}"
          echo "TARGET_URL=${{ env.TARGET_URL }}"
          echo "TARGET_IP=${{ env.TARGET_IP }}"
          echo "SSH_USER=${{ env.SSH_USER }}"

      - name: Send Google Chat Pipeline Started Alert
        run: |
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
          MESSAGE=$(printf '*[STARTED] PIPELINE EXECUTION STARTED*\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\nTime       : %s\nRepository : %s\nBranch     : %s\nRun Number : %s\nTarget     : %s\nService    : %s\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\nView Run   : <%s|Open GitHub Actions Run>' \
            "$TIMESTAMP" \
            "${{ github.event.repository.name }}" \
            "${{ github.ref_name }}" \
            "${{ github.run_number }}" \
            "${{ env.TARGET_URL }}" \
            "${{ env.APP_SERVICE_NAME }}" \
            "$RUN_URL")
          jq -n --arg text "$MESSAGE" '{"text": $text}' | \
            curl -s -X POST "https://chat.googleapis.com/v1/${{ secrets.GCHAT_SPACE_ID }}" \
              -H "Content-Type: application/json" \
              -d @-

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ env.TARGET_IP }} >> ~/.ssh/known_hosts

      - name: Configure Grafana Alloy Collector
        env:
          GRAFANA_PROMETHEUS_URL: ${{ secrets.GRAFANA_PROMETHEUS_URL }}
          GRAFANA_INSTANCE_ID: ${{ secrets.GRAFANA_INSTANCE_ID }}
          GRAFANA_LOKI_URL: ${{ secrets.GRAFANA_LOKI_URL }}
          GRAFANA_LOKI_USER: ${{ secrets.GRAFANA_LOKI_USER }}
          GRAFANA_TEMPO_URL: ${{ secrets.GRAFANA_TEMPO_URL }}
          GRAFANA_TEMPO_USER: ${{ secrets.GRAFANA_TEMPO_USER }}
          GRAFANA_API_KEY: ${{ secrets.GRAFANA_API_KEY }}
        run: |
          cat > /tmp/config.alloy << EOF

          // 1. Metrics (Prometheus)
          prometheus.exporter.unix "node" {}

          discovery.relabel "node" {
            targets = prometheus.exporter.unix.node.targets

            rule {
              target_label = "repo"
              replacement  = "${{ github.event.repository.name }}"
            }

            rule {
              target_label = "github_repository"
              replacement  = "${{ github.repository }}"
            }

            rule {
              target_label = "service_name"
              replacement  = "${{ env.APP_SERVICE_NAME }}"
            }
          }

          prometheus.scrape "local" {
            targets         = discovery.relabel.node.output
            forward_to      = [prometheus.remote_write.grafana_cloud.receiver]
            scrape_interval = "15s"
          }

          prometheus.remote_write "grafana_cloud" {
            endpoint {
              url = "${GRAFANA_PROMETHEUS_URL}"
              basic_auth {
                username = "${GRAFANA_INSTANCE_ID}"
                password = "${GRAFANA_API_KEY}"
              }
            }
          }

          // 2. Logs (Loki)
          loki.source.journal "read" {
            forward_to = [loki.write.grafana_cloud.receiver]
            labels = {
              job = "systemd-journal",
              host = "gcp-server",
              repo = "${{ github.event.repository.name }}",
              github_repository = "${{ github.repository }}",
              service_name = "${{ env.APP_SERVICE_NAME }}",
            }
          }

          loki.write "grafana_cloud" {
            endpoint {
              url = "${GRAFANA_LOKI_URL}"
              basic_auth {
                username = "${GRAFANA_LOKI_USER}"
                password = "${GRAFANA_API_KEY}"
              }
            }
          }

          // 3. Traces / APM (Tempo) + Service Graph Metrics
          otelcol.receiver.otlp "default" {
            http { endpoint = "0.0.0.0:4318" }
            grpc { endpoint = "0.0.0.0:4317" }
            output {
              traces = [
                otelcol.connector.servicegraph.default.input,
                otelcol.exporter.otlp.grafana_cloud_traces.input,
              ]
            }
          }

          otelcol.connector.servicegraph "default" {
            output {
              metrics = [otelcol.exporter.prometheus.service_graph.input]
            }
          }

          otelcol.exporter.prometheus "service_graph" {
            forward_to = [prometheus.remote_write.grafana_cloud.receiver]
          }

          otelcol.auth.basic "tempo" {
            username = "${GRAFANA_TEMPO_USER}"
            password = "${GRAFANA_API_KEY}"
          }

          otelcol.exporter.otlp "grafana_cloud_traces" {
            client {
              endpoint = "${GRAFANA_TEMPO_URL}"
              auth     = otelcol.auth.basic.tempo.handler
            }
          }
          EOF

          scp /tmp/config.alloy ${{ env.SSH_USER }}@${{ env.TARGET_IP }}:/tmp/config.alloy

          ssh ${{ env.SSH_USER }}@${{ env.TARGET_IP }} << 'SSHEOF'
            echo "--- Configuring Grafana Alloy Collector ---"
            if ! command -v alloy &> /dev/null; then
              sudo mkdir -p /etc/apt/keyrings/
              curl -fsSL https://apt.grafana.com/gpg.key | gpg --dearmor | sudo tee /etc/apt/keyrings/grafana.gpg > /dev/null
              echo "deb [signed-by=/etc/apt/keyrings/grafana.gpg] https://apt.grafana.com stable main" | sudo tee /etc/apt/sources.list.d/grafana.list
              sudo apt-get update && sudo apt-get install -y alloy
            fi
            sudo cp /tmp/config.alloy /etc/alloy/config.alloy
            sudo systemctl enable alloy
            sudo systemctl restart alloy
            sleep 3
            sudo systemctl status alloy --no-pager
          SSHEOF

      - name: Configure OpenTelemetry Runtime
        run: |
          ssh ${{ env.SSH_USER }}@${{ env.TARGET_IP }} << 'SSHEOF'
            echo "--- Configuring OpenTelemetry Runtime ---"
            sudo sed -i '/NODE_OPTIONS/d' /etc/environment
            sudo sed -i '/NODE_PATH/d' /etc/environment
            sudo sed -i '/OTEL_/d' /etc/environment
            echo "✅ Cleared stale runtime OTel env vars from /etc/environment"

            echo "OTEL_SERVICE_NAME=${{ env.APP_SERVICE_NAME }}" | sudo tee -a /etc/environment
            echo "OTEL_RESOURCE_ATTRIBUTES=service.namespace=${{ github.repository_owner }},deployment.environment=github-actions,github.repository=${{ github.repository }},github.repository.name=${{ github.event.repository.name }}" | sudo tee -a /etc/environment
            echo "OTEL_EXPORTER_OTLP_ENDPOINT=http://localhost:4318" | sudo tee -a /etc/environment
            echo "OTEL_EXPORTER_OTLP_PROTOCOL=http/protobuf" | sudo tee -a /etc/environment
            echo "OTEL_TRACES_EXPORTER=otlp" | sudo tee -a /etc/environment

            case "${{ env.APP_RUNTIME }}" in
              node)
                if ! command -v node &> /dev/null; then
                  curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash -
                  sudo apt-get install -y nodejs
                fi
                unset NODE_OPTIONS
                if ! node -e "require('@opentelemetry/auto-instrumentations-node')" 2>/dev/null; then
                  echo "⚠️ Installing Node.js OTel auto-instrumentation globally..."
                  sudo npm install -g \
                    @opentelemetry/auto-instrumentations-node \
                    @opentelemetry/sdk-node \
                    @opentelemetry/api
                  echo "✅ Node.js OTel installed globally"
                else
                  echo "✅ Node.js OTel already installed globally"
                fi
                GLOBAL_NODE_MODULES=$(unset NODE_OPTIONS && sudo npm root -g)
                if [ ! -d "$GLOBAL_NODE_MODULES/@opentelemetry/auto-instrumentations-node" ]; then
                  echo "❌ Node.js OTel module not found at $GLOBAL_NODE_MODULES — install failed"
                  ls "$GLOBAL_NODE_MODULES" || true
                  exit 1
                fi
                echo "NODE_OPTIONS=--require @opentelemetry/auto-instrumentations-node/register" | sudo tee -a /etc/environment
                echo "NODE_PATH=${GLOBAL_NODE_MODULES}" | sudo tee -a /etc/environment
                ;;
              python)
                if ! command -v python3 &> /dev/null; then
                  sudo apt-get update && sudo apt-get install -y python3 python3-pip python3-venv
                elif ! python3 -m pip --version &> /dev/null; then
                  sudo apt-get update && sudo apt-get install -y python3-pip python3-venv
                fi
                echo "OTEL_METRICS_EXPORTER=none" | sudo tee -a /etc/environment
                echo "OTEL_PYTHON_DISABLED_INSTRUMENTATIONS=aws_lambda" | sudo tee -a /etc/environment
                ;;
              none)
                echo "✅ Runtime instrumentation disabled. Alloy will still collect host metrics/logs and receive OTLP from instrumented apps."
                ;;
              *)
                echo "❌ Unsupported APP_RUNTIME='${{ env.APP_RUNTIME }}'. Use node, python, or none."
                exit 1
                ;;
            esac
          SSHEOF

      - name: Start Application with OpenTelemetry
        run: |
          ssh ${{ env.SSH_USER }}@${{ env.TARGET_IP }} << 'SSHEOF'
            echo "--- Starting Application with OpenTelemetry ---"
            set -a
            [ -f /etc/environment ] && . /etc/environment
            set +a

            if [ -n "${{ env.APP_RESTART_COMMAND }}" ]; then
              echo "--- Running advanced app restart command ---"
              bash -lc '${{ env.APP_RESTART_COMMAND }}'
            elif [ -n "${{ env.APP_WORKING_DIR }}" ] && [ -n "${{ env.APP_START_COMMAND }}" ]; then
              cd "${{ env.APP_WORKING_DIR }}"
              case "${{ env.APP_RUNTIME }}" in
                python)
                  PYTHON_BIN=$(printf '%s\n' "${{ env.APP_START_COMMAND }}" | awk '{print $1}')
                  if [ ! -x "$PYTHON_BIN" ] && ! command -v "$PYTHON_BIN" >/dev/null 2>&1; then
                    echo "❌ Python executable from APP_START_COMMAND was not found: $PYTHON_BIN"
                    exit 1
                  fi
                  if [ "$PYTHON_BIN" = "python" ] || [ "$PYTHON_BIN" = "python3" ] || [ "$PYTHON_BIN" = "/usr/bin/python3" ] || [ "$PYTHON_BIN" = "/usr/bin/python" ]; then
                    echo "❌ APP_START_COMMAND uses system Python: $PYTHON_BIN"
                    echo "   System Python may be externally managed by the OS (PEP 668), so the workflow will not install OpenTelemetry into it."
                    echo "   Use a virtualenv command such as APP_START_COMMAND='.venv/bin/python app.py' or manage instrumentation through APP_RESTART_COMMAND."
                    exit 1
                  fi
                  "$PYTHON_BIN" -m pip install --upgrade opentelemetry-distro opentelemetry-exporter-otlp
                  "$PYTHON_BIN" -m opentelemetry.instrumentation.bootstrap -a install
                  PYTHON_DIR=$(dirname "$PYTHON_BIN")
                  if [ -x "$PYTHON_DIR/opentelemetry-instrument" ]; then
                    OTEL_INSTRUMENT_BIN="$PYTHON_DIR/opentelemetry-instrument"
                  elif command -v opentelemetry-instrument >/dev/null 2>&1; then
                    OTEL_INSTRUMENT_BIN="opentelemetry-instrument"
                  else
                    echo "❌ opentelemetry-instrument not found after installation."
                    exit 1
                  fi
                  nohup $OTEL_INSTRUMENT_BIN ${{ env.APP_START_COMMAND }} > "${{ env.APP_LOG_FILE }}" 2>&1 &
                  ;;
                node)
                  if [ -f package.json ]; then
                    npm install @opentelemetry/api @opentelemetry/sdk-node @opentelemetry/auto-instrumentations-node
                  else
                    echo "⚠️ package.json not found in APP_WORKING_DIR; using global Node OpenTelemetry packages from runtime setup."
                  fi
                  nohup ${{ env.APP_START_COMMAND }} > "${{ env.APP_LOG_FILE }}" 2>&1 &
                  ;;
                none)
                  nohup ${{ env.APP_START_COMMAND }} > "${{ env.APP_LOG_FILE }}" 2>&1 &
                  ;;
                *)
                  echo "❌ Unsupported APP_RUNTIME='${{ env.APP_RUNTIME }}'. Use node, python, or none."
                  exit 1
                  ;;
              esac
              sleep 5
              if [ -n "${{ env.APP_PORT }}" ]; then
                if curl -sf "http://localhost:${{ env.APP_PORT }}/health" >/dev/null || curl -sf "http://localhost:${{ env.APP_PORT }}/" >/dev/null; then
                  echo "✅ App is responding on port ${{ env.APP_PORT }}"
                else
                  echo "❌ App did not respond on port ${{ env.APP_PORT }}"
                  cat "${{ env.APP_LOG_FILE }}" || true
                  exit 1
                fi
              fi
            else
              echo "APP_RESTART_COMMAND and simple app start settings are blank; skipping app restart/start."
            fi
          SSHEOF

      - name: Check Sentry SDK Integration
        run: |
          ssh ${{ env.SSH_USER }}@${{ env.TARGET_IP }} << 'SSHEOF'
            echo "--- Checking Sentry SDK Integration ---"
            if [ -n "${{ env.APP_WORKING_DIR }}" ] && [ -d "${{ env.APP_WORKING_DIR }}" ]; then
              cd "${{ env.APP_WORKING_DIR }}"
              SENTRY_INTEGRATED="false"
              case "${{ env.APP_RUNTIME }}" in
                python)
                  if grep -R "sentry_sdk\.init\|import sentry_sdk" . \
                    --include='*.py' \
                    --exclude-dir='.venv' \
                    --exclude-dir='venv' \
                    --exclude-dir='__pycache__' \
                    --exclude-dir='.git' >/dev/null 2>&1; then
                    SENTRY_INTEGRATED="true"
                  fi
                  ;;
                node)
                  if { [ -f package.json ] && grep -q '"@sentry/' package.json; } || \
                    grep -R "Sentry\.init\|@sentry/" . \
                    --include='*.js' \
                    --include='*.jsx' \
                    --include='*.ts' \
                    --include='*.tsx' \
                    --exclude-dir='node_modules' \
                    --exclude-dir='.git' >/dev/null 2>&1; then
                    SENTRY_INTEGRATED="true"
                  fi
                  ;;
                *)
                  echo "⚠️ Sentry SDK readiness check is not automated for APP_RUNTIME=${{ env.APP_RUNTIME }}."
                  ;;
              esac
              if [ "$SENTRY_INTEGRATED" = "true" ]; then
                echo "✅ Sentry SDK integration detected. Error tracking and crash reporting are implemented by the application."
              else
                echo "⚠️ Sentry SDK integration not detected. Pipeline will continue, but application error tracking and crash reporting may not be active."
              fi
            else
              echo "⚠️ APP_WORKING_DIR is blank or missing; skipping Sentry SDK integration check."
            fi
          SSHEOF

      - name: Write Provision Report
        if: always()
        run: |
          python3 - <<'PYEOF'
          import json, os, datetime

          report = {
              "job": "provision_monitoring",
              "status": "completed",
              "timestamp": datetime.datetime.utcnow().strftime('%Y-%m-%dT%H:%M:%SZ'),
              "repo": os.environ["GITHUB_REPOSITORY"].split("/", 1)[-1],
              "repository": os.environ["GITHUB_REPOSITORY"],
              "app_runtime": os.environ.get("APP_RUNTIME", ""),
              "app_service_name": os.environ.get("APP_SERVICE_NAME", ""),
              "app_working_dir": os.environ.get("APP_WORKING_DIR", ""),
              "app_port": os.environ.get("APP_PORT", ""),
              "grafana_alloy_configured": True,
              "opentelemetry_runtime_attempted": True,
              "app_start_attempted": bool(os.environ.get("APP_RESTART_COMMAND") or os.environ.get("APP_START_COMMAND")),
              "sentry_sdk_check_executed": True,
              "run_url": f"{os.environ['GITHUB_SERVER_URL']}/{os.environ['GITHUB_REPOSITORY']}/actions/runs/{os.environ['GITHUB_RUN_ID']}"
          }

          with open("provision-report.json", "w") as f:
              json.dump(report, f, indent=2)
          PYEOF

      - name: Upload Provision Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: provision-report
          path: provision-report.json

  # ==========================================
  # JOB 1: STEP 4 - Deep Security (VAPT)
  # ==========================================
  security_vapt_job:
    needs: provision_monitoring
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: OWASP ZAP Full Scan
        uses: zaproxy/action-full-scan@v0.12.0
        with:
          target: ${{ env.TARGET_URL }}
          fail_action: false
          cmd_options: '-a -j -r report_html.html -J report_json.json'

      - name: Analyse ZAP Results and Log to Wazuh
        if: always()
        run: |
          TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          if [ ! -f report_json.json ]; then
            ZAP_STATUS="error"
            REPORT="CRITICAL: ZAP failed to generate report."
            HIGH=0; MEDIUM=0; LOW=0; INFO=0; TOTAL_ALERTS=0
          else
            HIGH=$(jq '[.site[]?.alerts[]? | select(.riskcode == "3")] | length' report_json.json 2>/dev/null || echo 0)
            MEDIUM=$(jq '[.site[]?.alerts[]? | select(.riskcode == "2")] | length' report_json.json 2>/dev/null || echo 0)
            LOW=$(jq '[.site[]?.alerts[]? | select(.riskcode == "1")] | length' report_json.json 2>/dev/null || echo 0)
            INFO=$(jq '[.site[]?.alerts[]? | select(.riskcode == "0")] | length' report_json.json 2>/dev/null || echo 0)
            TOTAL_ALERTS=$(jq '[.site[]?.alerts[]?] | length' report_json.json 2>/dev/null || echo 0)

            if [ "$TOTAL_ALERTS" -lt 2 ]; then
              ZAP_STATUS="blocked"; REPORT="WARNING: Site may be protected by WAF."
            elif [ "$HIGH" -gt 0 ]; then
              ZAP_STATUS="vulnerable"; REPORT="CRITICAL VULNERABILITIES FOUND: ${HIGH} High, ${MEDIUM} Medium, ${LOW} Low, ${INFO} Informational."
            elif [ "$MEDIUM" -gt 0 ]; then
              ZAP_STATUS="warning"; REPORT="MEDIUM VULNERABILITIES FOUND: ${MEDIUM} Medium, ${LOW} Low, ${INFO} Informational. Review within SLA."
            else
              ZAP_STATUS="clean"; REPORT="PASS: No High/Medium vulnerabilities detected. ${LOW} Low, ${INFO} Informational findings logged."
            fi
          fi
          curl -k -s -X POST "${{ env.WAZUH_INDEXER_URL }}/pipeline-audit/_doc/" \
            -u "admin:${{ secrets.WAZUH_INDEXER_PASSWORD }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"timestamp\": \"$TIMESTAMP\",
              \"event_type\": \"SECURITY_VAPT_SCAN\",
              \"product_id\": \"${{ secrets.DEFECTDOJO_PRODUCT_ID }}\",
              \"repo\": \"${{ github.event.repository.name }}\",
              \"status\": \"$ZAP_STATUS\",
              \"alerts_high\": $HIGH,
              \"alerts_medium\": $MEDIUM,
              \"alerts_low\": $LOW,
              \"alerts_info\": $INFO,
              \"alerts_total\": $TOTAL_ALERTS,
              \"breach_details\": \"$REPORT\",
              \"run_url\": \"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"
            }"
          jq -n \
            --arg job "security_vapt_job" \
            --arg timestamp "$TIMESTAMP" \
            --arg repo "${{ github.event.repository.name }}" \
            --arg repository "${{ github.repository }}" \
            --arg target "${{ env.TARGET_URL }}" \
            --arg status "$ZAP_STATUS" \
            --arg report "$REPORT" \
            --arg run_url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --argjson high "$HIGH" \
            --argjson medium "$MEDIUM" \
            --argjson low "$LOW" \
            --argjson info "$INFO" \
            --argjson total_alerts "$TOTAL_ALERTS" \
            '{job: $job, timestamp: $timestamp, repo: $repo, repository: $repository, target: $target, status: $status, alerts_high: $high, alerts_medium: $medium, alerts_low: $low, alerts_info: $info, alerts_total: $total_alerts, breach_details: $report, run_url: $run_url}' \
            > vapt-report.json
          if [ "$ZAP_STATUS" = "vulnerable" ] || [ "$ZAP_STATUS" = "error" ]; then exit 1; fi

      - name: Upload VAPT Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vapt-report
          path: vapt-report.json

  # ==========================================
  # JOB 2: STEP 5 - Benchmarking
  # ==========================================
  benchmarking_job:
    needs: provision_monitoring
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Tools (k6, jq, Apache Bench)
        run: sudo apt-get update && sudo apt-get install -y apache2-utils jq curl

      - name: Install k6
        run: |
          curl -fsSL https://dl.k6.io/key.gpg | sudo gpg --dearmor -o /usr/share/keyrings/k6-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update && sudo apt-get install -y k6

      - name: Run Apache Bench Stress Test
        run: |
          ab -n 500 -c 10 ${{ env.TARGET_URL }}/ > stress-results.txt
          grep -E "Complete requests|Failed requests|Requests per second|Time per request|Transfer rate" stress-results.txt || true

      - name: Run k6 Load Test
        id: k6_run
        run: |
          cat << 'EOF' > k6-test.js
          import http from 'k6/http';
          import { check } from 'k6';
          export const options = {
            iterations: 50,
            thresholds: {
              'http_req_duration':['p(95)<' + __ENV.LATENCY_LIMIT],
              'http_req_failed':['rate<' + __ENV.ERROR_LIMIT],
              'checks': ['rate==1.0']
            }
          };
          export default function () {
            const res = http.get(__ENV.MY_URL);
            check(res, { 'status_is_correct': (r) => r.status === parseInt(__ENV.EXPECTED_ST) });
          }
          EOF
          k6 run --out cloud --summary-export=result.json k6-test.js
        env:
          MY_URL: ${{ env.TARGET_URL }}
          LATENCY_LIMIT: ${{ env.LATENCY_THRESHOLD }}
          ERROR_LIMIT: ${{ env.ERROR_RATE_LIMIT }}
          EXPECTED_ST: ${{ env.EXPECTED_STATUS }}
          K6_CLOUD_TOKEN: ${{ secrets.K6_CLOUD_TOKEN }}
          K6_CLOUD_PROJECT_ID: ${{ secrets.K6_PROJECT_ID }}
          K6_CLOUD_NAME: "${{ github.event.repository.name }}"

      - name: Log Performance Audit to Wazuh Indexer
        if: always()
        env:
          WAZUH_INDEXER_URL: ${{ env.WAZUH_INDEXER_URL }}
          WAZUH_INDEXER_PASSWORD: ${{ secrets.WAZUH_INDEXER_PASSWORD }}
          DEFECTDOJO_PRODUCT_ID: ${{ secrets.DEFECTDOJO_PRODUCT_ID }}
          REPO_NAME: ${{ github.event.repository.name }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          LATENCY_THRESHOLD: ${{ env.LATENCY_THRESHOLD }}
          ERROR_RATE_LIMIT: ${{ env.ERROR_RATE_LIMIT }}
          EXPECTED_STATUS: ${{ env.EXPECTED_STATUS }}
        run: |
          python3 - <<'PYEOF'
          import json, os, datetime, urllib.request, ssl, base64, traceback, sys

          try:
              result_path = 'result.json'
              print(f"result.json exists: {os.path.exists(result_path)}", flush=True)

              if os.path.exists(result_path):
                  with open(result_path) as f:
                      d = json.load(f)

                  m = d['metrics']
                  r = d['root_group']

                  print(f"metrics keys: {list(m.keys())}", flush=True)
                  print(f"http_req_duration keys: {list(m['http_req_duration'].keys())}", flush=True)
                  print(f"http_req_failed keys: {list(m['http_req_failed'].keys())}", flush=True)
                  print(f"root_group checks keys: {list(r['checks'].keys())}", flush=True)

                  actual_lat  = int(m['http_req_duration']['p(95)'])
                  actual_err  = float(m['http_req_failed']['value'])
                  check_fails = int(r['checks']['status_is_correct']['fails'])
                  lat_limit   = int(os.environ['LATENCY_THRESHOLD'])
                  err_limit   = float(os.environ['ERROR_RATE_LIMIT'])
                  expected_st = os.environ['EXPECTED_STATUS']

                  print(f"actual_lat={actual_lat}, actual_err={actual_err}, check_fails={check_fails}", flush=True)

                  report = "AUDIT DETAILS:"
                  if actual_lat > lat_limit:
                      report += f" | LATENCY BREACH: Observed {actual_lat}ms (Limit: {lat_limit}ms)"
                  if actual_err > err_limit:
                      report += f" | RELIABILITY FAIL: Error rate was {actual_err:.4f} (Limit: {err_limit})"
                  if check_fails > 0:
                      report += f" | STATUS MISMATCH: {check_fails} requests got unexpected status, expected {expected_st}"
                  if report == "AUDIT DETAILS:":
                      report = "PASS: All metrics within industry thresholds."
                      audit_status = "success"
                  else:
                      audit_status = "failure"
              else:
                  actual_lat, actual_err, check_fails = 0, 0.0, 0
                  lat_limit   = int(os.environ.get('LATENCY_THRESHOLD', 0))
                  expected_st = os.environ.get('EXPECTED_STATUS', '0')
                  report      = "CRITICAL: No result.json found."
                  audit_status = "failure"

              payload = {
                  "timestamp":            datetime.datetime.utcnow().strftime('%Y-%m-%dT%H:%M:%SZ'),
                  "event_type":           "PERFORMANCE_AUDIT",
                  "product_id":           os.environ['DEFECTDOJO_PRODUCT_ID'],
                  "repo":                 os.environ['REPO_NAME'],
                  "status":               audit_status,
                  "threshold":            f"p(95)<{os.environ['LATENCY_THRESHOLD']}ms | error_rate<{os.environ['ERROR_RATE_LIMIT']} | status=={os.environ['EXPECTED_STATUS']}",
                  "latency_observed_ms":  actual_lat,
                  "latency_threshold_ms": int(os.environ['LATENCY_THRESHOLD']),
                  "error_rate_observed":  actual_err,
                  "error_rate_limit":     float(os.environ['ERROR_RATE_LIMIT']),
                  "expected_status_code": int(os.environ['EXPECTED_STATUS']),
                  "status_check_fails":   check_fails,
                  "breach_details":       report,
                  "run_url":              os.environ['RUN_URL']
              }

              benchmark_report = dict(payload)
              benchmark_report["job"] = "benchmarking_job"
              benchmark_report["repository"] = os.environ.get("GITHUB_REPOSITORY", "")
              benchmark_report["target"] = os.environ.get("TARGET_URL", "")
              with open("benchmark-report.json", "w") as f:
                  json.dump(benchmark_report, f, indent=2)

              print(f"Sending payload: {json.dumps(payload, indent=2)}", flush=True)

              url  = os.environ['WAZUH_INDEXER_URL'] + '/pipeline-audit/_doc/'
              auth = base64.b64encode(f"admin:{os.environ['WAZUH_INDEXER_PASSWORD']}".encode()).decode()
              req  = urllib.request.Request(
                  url,
                  data=json.dumps(payload).encode(),
                  headers={'Content-Type': 'application/json', 'Authorization': f'Basic {auth}'},
                  method='POST'
              )
              ctx = ssl._create_unverified_context()
              with urllib.request.urlopen(req, context=ctx) as resp:
                  response_body = resp.read().decode()
                  print(f"Wazuh response ({resp.status}): {response_body}", flush=True)

              with open(os.environ['GITHUB_ENV'], 'a') as f_env:
                  f_env.write(f"AUDIT_STATUS={audit_status}\n")
                  f_env.write(f"AUDIT_REPORT={report}\n")
                  f_env.write(f"ACTUAL_LAT={actual_lat}\n")
                  f_env.write(f"ACTUAL_ERR={actual_err}\n")
                  f_env.write(f"CHECK_FAILS={check_fails}\n")

          except Exception as e:
              print(f"ERROR: {e}", flush=True)
              traceback.print_exc()
              sys.exit(1)

          PYEOF

      - name: Upload Benchmarking Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: performance-logs
          path: |
            stress-results.txt
            result.json
            k6-test.js
            benchmark-report.json

  # ==========================================
  # JOB 3: Final Workflow Notification
  # ==========================================
  notify_pipeline_result:
    if: always()
    needs:
      - provision_monitoring
      - security_vapt_job
      - benchmarking_job
    runs-on: ubuntu-latest
    steps:
      - name: Download Provision Report
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: provision-report
          path: reports/provision

      - name: Download VAPT Report
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: vapt-report
          path: reports/vapt

      - name: Download Benchmark Report
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: performance-logs
          path: reports/benchmark

      - name: Send Final Google Chat Pipeline Result
        env:
          PROVISION_JOB_RESULT: ${{ needs.provision_monitoring.result }}
          VAPT_JOB_RESULT: ${{ needs.security_vapt_job.result }}
          BENCHMARK_JOB_RESULT: ${{ needs.benchmarking_job.result }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          REPO_NAME: ${{ github.event.repository.name }}
          REPOSITORY: ${{ github.repository }}
          RUN_NUMBER: ${{ github.run_number }}
          TARGET_URL: ${{ env.TARGET_URL }}
          APP_SERVICE_NAME: ${{ env.APP_SERVICE_NAME }}
          DEFECTDOJO_PRODUCT_ID: ${{ secrets.DEFECTDOJO_PRODUCT_ID }}
        run: |
          python3 - <<'PYEOF' > final-message.txt
          import json, os, datetime
          from pathlib import Path

          def load_json(path):
              p = Path(path)
              if not p.exists():
                  return None
              try:
                  return json.loads(p.read_text())
              except Exception:
                  return None

          provision = load_json("reports/provision/provision-report.json")
          vapt = load_json("reports/vapt/vapt-report.json")
          benchmark = load_json("reports/benchmark/benchmark-report.json")

          provision_result = os.environ["PROVISION_JOB_RESULT"]
          vapt_result = os.environ["VAPT_JOB_RESULT"]
          benchmark_result = os.environ["BENCHMARK_JOB_RESULT"]
          all_success = provision_result == vapt_result == benchmark_result == "success"
          timestamp = datetime.datetime.utcnow().strftime('%Y-%m-%d %H:%M UTC')

          if vapt:
              vapt_summary = (
                  f"VAPT Status : {vapt.get('status', 'unknown')}\n"
                  f"Details     : {vapt.get('breach_details', 'No VAPT details available.')}\n"
                  f"Findings    : High={vapt.get('alerts_high', 0)}, Medium={vapt.get('alerts_medium', 0)}, "
                  f"Low={vapt.get('alerts_low', 0)}, Info={vapt.get('alerts_info', 0)}, Total={vapt.get('alerts_total', 0)}"
              )
          else:
              vapt_summary = "VAPT Status : unavailable\nDetails     : vapt-report.json was not available. Check VAPT job logs.\nFindings    : unavailable"

          if all_success:
              print(f"""*[SUCCESS] PIPELINE COMPLETED SUCCESSFULLY*
          ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
          Time       : {timestamp}
          Repository : {os.environ['REPO_NAME']}
          Run Number : {os.environ['RUN_NUMBER']}
          Target     : {os.environ['TARGET_URL']}
          Service    : {os.environ['APP_SERVICE_NAME']}
          ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
          *RESULT*
          Provisioning, security scan, and benchmarking completed successfully.

          Job Statuses:
            • Provisioning : {provision_result}
            • VAPT        : {vapt_result}
            • Benchmark   : {benchmark_result}

          *SECURITY SUMMARY*
          {vapt_summary}

          View Run   : <{os.environ['RUN_URL']}|Open GitHub Actions Run>""")
          else:
              failures = []
              if provision_result != "success":
                  if provision:
                      failures.append(f"  • Provisioning: {provision_result} — runtime={provision.get('app_runtime', 'unknown')}, service={provision.get('app_service_name', 'unknown')}")
                  else:
                      failures.append(f"  • Provisioning: {provision_result} — report missing; check provisioning logs.")

              if vapt_result != "success":
                  if vapt:
                      failures.append(
                          f"  • VAPT: {vapt_result} — {vapt.get('breach_details', 'Security scan failed.')} "
                          f"Counts: High={vapt.get('alerts_high', 0)}, Medium={vapt.get('alerts_medium', 0)}, Low={vapt.get('alerts_low', 0)}, Info={vapt.get('alerts_info', 0)}"
                      )
                  else:
                      failures.append(f"  • VAPT: {vapt_result} — report missing; scan may have failed before analysis.")

              if benchmark_result != "success":
                  if benchmark:
                      failures.append(f"  • Benchmark: {benchmark_result} — {benchmark.get('breach_details', 'Benchmark failed.')}")
                      failures.append(
                          f"    Metrics: latency={benchmark.get('latency_observed_ms', 0)}ms/{benchmark.get('latency_threshold_ms', os.environ.get('LATENCY_THRESHOLD', 'unknown'))}ms, "
                          f"error_rate={benchmark.get('error_rate_observed', 0)}/{benchmark.get('error_rate_limit', 'unknown')}, "
                          f"status_failures={benchmark.get('status_check_fails', 0)}, expected_status={benchmark.get('expected_status_code', 'unknown')}"
                      )
                  else:
                      failures.append(f"  • Benchmark: {benchmark_result} — report missing; k6 or audit logging may have failed early.")

              if not failures:
                  failures.append("  • Pipeline failed. No detailed report artifacts were available; check runner logs.")

              print(f"""*[CRITICAL] PIPELINE FAILURE DETECTED*
          ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
          Incident ID : INC-{os.environ['RUN_NUMBER']}
          Time        : {timestamp}
          Repository  : {os.environ['REPO_NAME']}
          Product ID  : {os.environ['DEFECTDOJO_PRODUCT_ID']}
          Target      : {os.environ['TARGET_URL']}
          Service     : {os.environ['APP_SERVICE_NAME']}
          ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
          *JOB STATUSES*
            • Provisioning : {provision_result}
            • VAPT        : {vapt_result}
            • Benchmark   : {benchmark_result}

          *SECURITY SUMMARY*
          {vapt_summary}

          *FAILURE ANALYSIS*

          {chr(10).join(failures)}
          ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
          *ACTIONS*

          Investigate : <{os.environ['RUN_URL']}|View GitHub Actions Run>
          Audit Hub   : <https://35.200.203.148|Wazuh Security Dashboard>
          ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
          *NEXT STEPS:* Review logs  >  Identify root cause  >  Hotfix or rollback""")
          PYEOF

          MESSAGE=$(cat final-message.txt)
          jq -n --arg text "$MESSAGE" '{"text": $text}' | \
            curl -s -X POST "https://chat.googleapis.com/v1/${{ secrets.GCHAT_SPACE_ID }}" \
              -H "Content-Type: application/json" \
              -d @-
