name: Step 4 & 5 - Parallel Security & Benchmarking with Observability

on:
  workflow_dispatch:

jobs:
  # ==========================================
  # JOB 1: STEP 4 (Security Scan)
  # ==========================================
  security_scan_job:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: OWASP ZAP Full Scan
        uses: zaproxy/action-full-scan@v0.12.0
        with:
          target: 'https://husaintrivedi.site' 
          fail_action: false
          cmd_options: '-a -j -r report_html.html -J report_json.json'

      - name: Upload Security Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vapt-report
          path: |
            report_html.html
            report_json.json

  # ==========================================
  # JOB 2: STEP 5 (Benchmarking with Grafana)
  # ==========================================
  benchmarking_job:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code 
        uses: actions/checkout@v4

      # Install tools
      - name: Install Apache Bench
        run: sudo apt-get update && sudo apt-get install -y apache2-utils

      - name: Install k6
        run: |
          curl -L https://github.com/grafana/k6/releases/latest/download/k6-v0.49.0-linux-amd64.tar.gz -o k6.tar.gz
          tar -xzf k6.tar.gz
          sudo mv k6-*-linux-amd64/k6 /usr/bin/k6
          k6 version

      # Stress Test
      - name: Run Apache Bench Stress Test
        run: ab -n 500 -c 10 https://husaintrivedi.site/ | tee stress-results.txt

      # Create k6 script (clean version)
      - name: Create k6 script
        run: |
          cat << 'EOF' > k6-test.js
          import http from 'k6/http';
          import { sleep, check } from 'k6';

          export const options = { 
            vus: 10, 
            duration: '10s',
            thresholds: { 
              http_req_duration: ['p(98)<2000'], 
              http_req_failed: ['rate<0.01'],
              checks: ['rate==1.0'],
              http_req_waiting: ['p(95)<1000']
            } 
          };

          export default function () {
            let res = http.get('https://husaintrivedi.site'); 
            check(res, { 'status is 200': (r) => r.status === 200 });
            sleep(1);
          }
          EOF

      # ✅ NEW CORRECT WAY (Grafana Cloud)
      - name: Run k6 Cloud Test
        run: |
          curl -s https://dl.k6.io/install.sh | sudo bash
          k6 version
        env:
          K6_CLOUD_TOKEN: ${{ secrets.K6_CLOUD_TOKEN }}

      # Upload logs
      - name: Upload Performance Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: live-site-performance-logs
          path: |
            stress-results.txt
            k6-test.js
