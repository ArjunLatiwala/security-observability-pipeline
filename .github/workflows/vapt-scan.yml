- name: Run k6 Load Test and Stream to Grafana
        uses: grafana/k6-action@v0.3.1
        with:
          filename: k6-test.js
          # This is the magic command that tells k6 to stream the results
          flags: --out cloud
          # The secret is passed directly inside the 'with' block
          env: |
            K6_CLOUD_TOKEN: ${{ secrets.K6_CLOUD_TOKEN }}
