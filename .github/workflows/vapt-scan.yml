name: Step 4 & 5 - Final Scalable Enterprise Architecture

on:
  workflow_dispatch:

env:
  TARGET_URL: 'https://husaintrivedi.site'
  WAZUH_INDEXER_URL: 'https://35.200.203.148:8080'
  WAZUH_MANAGER_URL: 'https://35.200.203.148:55000'
  # --- INTENTIONAL FAILURES FOR DEMO ---
  LATENCY_THRESHOLD: 100        # Fail: Real latency > 10ms
  EXPECTED_STATUS: 200           # Fail: Site is 200, we want 201
  ERROR_RATE_LIMIT: 0.05       # Fail: Tiny threshold

jobs:
  # ==========================================
  # JOB 1: STEP 4 - Deep Security (VAPT)
  # ==========================================
  security_vapt_job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: OWASP ZAP Full Scan
        uses: zaproxy/action-full-scan@v0.12.0
        with:
          target: ${{ env.TARGET_URL }}
          fail_action: false
          cmd_options: '-a -j -r report_html.html -J report_json.json'

      - name: Log Security Audit to Wazuh Indexer
        if: always()
        continue-on-error: true
        run: |
          TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          curl -k -s -X POST "${{ env.WAZUH_INDEXER_URL }}/pipeline-audit/_doc/" \
            -u "admin:${{ secrets.WAZUH_INDEXER_PASSWORD }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"timestamp\": \"$TIMESTAMP\",
              \"event_type\": \"SECURITY_VAPT_SCAN\",
              \"product_id\": \"${{ secrets.DEFECTDOJO_PRODUCT_ID }}\",
              \"repo\": \"${{ github.event.repository.name }}\",
              \"status\": \"${{ job.status }}\",
              \"run_url\": \"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"
            }"

      - name: Upload Security Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vapt-reports
          path: |
            report_html.html
            report_json.json

  # ==========================================
  # JOB 2: STEP 5 - Benchmarking + Sentry
  # ==========================================
  benchmarking_job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Tools (k6, jq, Apache Bench)
        run: sudo apt-get update && sudo apt-get install -y apache2-utils jq curl

      - name: Install k6
        run: |
          curl -fsSL https://dl.k6.io/key.gpg | sudo gpg --dearmor -o /usr/share/keyrings/k6-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update && sudo apt-get install -y k6

      - name: Run Apache Bench Stress Test
        run: ab -n 500 -c 10 ${{ env.TARGET_URL }}/ | tee stress-results.txt

      - name: Run k6 Load Test
        id: k6_run
        run: |
          cat << 'EOF' > k6-test.js
          import http from 'k6/http';
          import { check } from 'k6';
          export const options = { 
            iterations: 50,
            thresholds: { 
              'http_req_duration':['p(95)<' + __ENV.LATENCY_LIMIT],
              'http_req_failed':['rate<' + __ENV.ERROR_LIMIT],
              'checks': ['rate==1.0']
            } 
          };
          export default function () { 
            const res = http.get(__ENV.MY_URL);
            check(res, { 'status_is_correct': (r) => r.status === parseInt(__ENV.EXPECTED_ST) });
          }
          EOF
          k6 run --summary-export=result.json k6-test.js
        env:
          MY_URL: ${{ env.TARGET_URL }}
          LATENCY_LIMIT: ${{ env.LATENCY_THRESHOLD }}
          ERROR_LIMIT: ${{ env.ERROR_RATE_LIMIT }}
          EXPECTED_ST: ${{ env.EXPECTED_STATUS }}
          
      - name: Log Performance Audit to Wazuh Indexer
        if: failure()
        run: |
          if [ -f result.json ]; then
            # Correct paths matching your actual k6 JSON structure
            ACTUAL_LAT=$(jq -r '.metrics.http_req_duration.avg // 0' result.json | cut -d. -f1)
            ACTUAL_ERR=$(jq -r '.metrics.http_req_failed.value // 0' result.json)
            CHECK_FAILS=$(jq -r '.metrics.checks.fails // 0' result.json)
            CHECK_PASSES=$(jq -r '.metrics.checks.passes // 0' result.json)
      
            # Check threshold breach flags directly from k6
            LAT_THRESHOLD_BREACHED=$(jq -r '
              .metrics.http_req_duration.thresholds // {} | 
              to_entries | map(select(.value == false)) | length' result.json)
            ERR_THRESHOLD_BREACHED=$(jq -r '
              .metrics.http_req_failed.thresholds // {} | 
              to_entries | map(select(.value == false)) | length' result.json)
      
            REPORT="AUDIT DETAILS:"
      
            if [ "$LAT_THRESHOLD_BREACHED" -gt 0 ]; then
              REPORT="$REPORT | LATENCY BREACH: Observed ${ACTUAL_LAT}ms (Limit: ${{ env.LATENCY_THRESHOLD }}ms)"
            fi
      
            if [ "$ERR_THRESHOLD_BREACHED" -gt 0 ]; then
              REPORT="$REPORT | RELIABILITY FAIL: Error rate threshold breached (Limit: ${{ env.ERROR_RATE_LIMIT }})"
            fi
      
            if [ "$CHECK_FAILS" -gt 0 ]; then
              REPORT="$REPORT | STATUS MISMATCH: ${CHECK_FAILS} requests got HTTP 200, expected ${{ env.EXPECTED_STATUS }}"
            fi
      
            if [ "$REPORT" = "AUDIT DETAILS:" ]; then
              REPORT="PASS: All metrics within industry thresholds."
            fi
          else
            REPORT="CRITICAL: Benchmarking engine failed to generate results."
            ACTUAL_LAT=0
            ACTUAL_ERR=0
            CHECK_FAILS=0
            LAT_THRESHOLD_BREACHED=0
            ERR_THRESHOLD_BREACHED=0
          fi
      
          TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          curl -k -s -X POST "${{ env.WAZUH_INDEXER_URL }}/pipeline-audit/_doc/" \
            -u "admin:${{ secrets.WAZUH_INDEXER_PASSWORD }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"timestamp\": \"$TIMESTAMP\",
              \"event_type\": \"PERFORMANCE_AUDIT\",
              \"product_id\": \"${{ secrets.DEFECTDOJO_PRODUCT_ID }}\",
              \"repo\": \"${{ github.event.repository.name }}\",
              \"status\": \"failure\",
              \"threshold\": \"p(95)<${{ env.LATENCY_THRESHOLD }}ms | error_rate<${{ env.ERROR_RATE_LIMIT }} | status==${{ env.EXPECTED_STATUS }}\",
              \"latency_observed_ms\": $ACTUAL_LAT,
              \"latency_threshold_ms\": ${{ env.LATENCY_THRESHOLD }},
              \"error_rate_observed\": $ACTUAL_ERR,
              \"error_rate_limit\": ${{ env.ERROR_RATE_LIMIT }},
              \"expected_status_code\": ${{ env.EXPECTED_STATUS }},
              \"status_check_fails\": $CHECK_FAILS,
              \"breach_details\": \"$REPORT\",
              \"run_url\": \"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"
            }"
            
      - name: Send Google Chat Alert on Failure
        if: failure()
        run: |
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
      
          ACTUAL_LAT=$(jq -r '.metrics.http_req_duration.values["p(95)"] // 25' result.json | awk '{print int($1)}')
          ACTUAL_ERR=$(jq -r '.metrics.http_req_failed.values.rate // 0.05' result.json)
          ACTUAL_STATUS=$(jq -r '.metrics.checks.values.rate // 0' result.json)
      
          LAT_LIMIT="${{ env.LATENCY_THRESHOLD }}"
          ERR_LIMIT="${{ env.ERROR_RATE_LIMIT }}"
          EXPECTED_ST="${{ env.EXPECTED_STATUS }}"
      
          FAILURES=""
          if (( ACTUAL_LAT > LAT_LIMIT )); then
            FAILURES="${FAILURES}• Latency: ${ACTUAL_LAT}ms (Limit ${LAT_LIMIT}ms) - Website is too slow for users, resulting in a degraded experience."$'\n'
          fi
          if (( $(echo "$ACTUAL_ERR > $ERR_LIMIT" | bc -l) )); then
            FAILURES="${FAILURES}• Errors: ${ACTUAL_ERR} (Limit ${ERR_LIMIT}) - Server is unstable and may be dropping connections or returning 500s."$'\n'
          fi
          if (( $(echo "$ACTUAL_STATUS < 1.0" | bc -l) )); then
            FAILURES="${FAILURES}• Status: Found 200 (Expected ${EXPECTED_ST}) - Server is alive but returned an incorrect status, indicating a logic error."$'\n'
          fi
          if [ -z "$FAILURES" ]; then
            FAILURES="• Pipeline step failed. Check the GitHub Actions logs for details."$'\n'
          fi
      
          # Build message using printf for clean newlines
          MESSAGE=$(printf '🚨 *CRITICAL: PIPELINE FAILURE DETECTED*\n Repository: %s\n Product ID: %s\n *Failure Analysis:*\n%s\n Action: <%s|Investigate Logs in GitHub>\n Audit Hub: <https://35.200.203.148|Wazuh Dashboard>' \
            "${{ github.event.repository.name }}" \
            "${{ secrets.DEFECTDOJO_PRODUCT_ID }}" \
            "$FAILURES" \
            "$RUN_URL")
      
          # Use jq to safely encode the message into JSON — no manual escaping
          jq -n --arg text "$MESSAGE" '{"text": $text}' | \
            curl -s -X POST "https://chat.googleapis.com/v1/${{ secrets.GCHAT_SPACE_ID }}" \
              -H "Content-Type: application/json" \
              -d @-
      
          exit 1

      - name: Report Failure to Sentry
        if: failure()
        run: |
          DSN="${{ secrets.SENTRY_DSN }}"
          SENTRY_KEY=$(echo $DSN | awk -F'[:@/]' '{print $4}')
          SENTRY_HOST=$(echo $DSN | awk -F'[:@/]' '{print $5}')
          PROJECT_ID=$(echo $DSN | awk -F'[:@/]' '{print $6}')

          curl -X POST "https://$SENTRY_HOST/api/$PROJECT_ID/store/" \
          -H "X-Sentry-Auth: Sentry sentry_version=7, sentry_key=$SENTRY_KEY, sentry_client=curl/1.0" \
          -H 'Content-Type: application/json' \
          -d "{
            \"message\": \"Performance Regression: ${{ github.event.repository.name }}\",
            \"exception\": {
              \"values\":[{
                \"type\": \"PerformanceThresholdError\",
                \"value\": \"Threshold of ${{ env.LATENCY_THRESHOLD }}ms failed for Product ID: ${{ secrets.DEFECTDOJO_PRODUCT_ID }}.\"
              }]
            },
            \"level\": \"error\",
            \"fingerprint\":[\"${{ github.event.repository.name }}\", \"perf-failure\"],
            \"tags\": {
              \"repo\": \"${{ github.event.repository.name }}\",
              \"product_id\": \"${{ secrets.DEFECTDOJO_PRODUCT_ID }}\"
            }
          }"

      - name: Upload Benchmarking Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: performance-logs
          path: |
            stress-results.txt
            result.json
            k6-test.js
