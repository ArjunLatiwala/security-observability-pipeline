name: Step 4 & 5 - Final Scalable Enterprise Architecture

on:
  workflow_dispatch:

# 🌍 GLOBAL CONFIGURATION - Change once here to update all 400 repos
env:
  TARGET_URL: 'https://husaintrivedi.site'
  LATENCY_THRESHOLD: '10' # Set to 10 to test Sentry failure

jobs:
  # ==========================================
  # STEP 4: Security (VAPT) + Wazuh SIEM
  # ==========================================
  security_scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: OWASP ZAP Full Scan
        uses: zaproxy/action-full-scan@v0.12.0
        with:
          target: ${{ env.TARGET_URL }}
          fail_action: false
          cmd_options: '-a -j -r report_html.html -J report_json.json'

      - name: Push Event to Wazuh SIEM
        if: always()
        continue-on-error: true # Safe scaling: won't break if firewall is closed
        run: |
          # 1. Get Auth Token
          TOKEN=$(curl -u "${{ secrets.WAZUH_API_USER }}:${{ secrets.WAZUH_API_PASSWORD }}" -k -s -X GET "${{ secrets.WAZUH_URL }}/security/user/authenticate" | jq -r .data.token)
          
          # 2. Push the log to your server
          curl -k -s -X POST "${{ secrets.WAZUH_URL }}/syslog" \
          -H "Authorization: Bearer $TOKEN" \
          -H "Content-Type: application/json" \
          -d '{
            "product_id": "${{ secrets.DEFECTDOJO_PRODUCT_ID }}",
            "repo": "${{ github.event.repository.name }}",
            "event": "VAPT_SCAN_COMPLETED",
            "status": "${{ job.status }}"
          }'

      - name: Upload Security Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vapt-report
          path: |
            report_html.html
            report_json.json

  # ==========================================
  # STEP 5: Benchmarking + Sentry + Grafana
  # ==========================================
  benchmarking:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code 
        uses: actions/checkout@v4

      - name: Setup Tools (k6 & AB)
        run: |
          sudo apt-get update && sudo apt-get install -y apache2-utils jq
          curl -fsSL https://dl.k6.io/key.gpg | sudo gpg --dearmor -o /usr/share/keyrings/k6-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update && sudo apt-get install -y k6

      - name: Create k6 script
        # 💡 Mapping to env prevents "Context access invalid" errors
        env:
          THRESHOLD: ${{ env.LATENCY_THRESHOLD }}
          URL: ${{ env.TARGET_URL }}
        run: |
          cat << EOF > k6-test.js
          import http from 'k6/http';
          import { sleep, check } from 'k6';
          export const options = { 
            vus: 10, duration: '10s',
            thresholds: { 'http_req_duration': ['p(98)<$THRESHOLD'] } 
          };
          export default function () {
            let res = http.get('$URL'); 
            check(res, { 'status is 200': (r) => r.status === 200 });
            sleep(1);
          }
          EOF

      - name: Run k6 Cloud Test
        run: |
          k6 run --out cloud \
          --tag product_id="${{ secrets.DEFECTDOJO_PRODUCT_ID }}" \
          k6-test.js
        env:
          K6_CLOUD_TOKEN: ${{ secrets.K6_CLOUD_TOKEN }}
          K6_CLOUD_PROJECT_ID: 7324608
          K6_CLOUD_NAME: "${{ github.event.repository.name }}"

      # ✅ DYNAMIC SENTRY ALERT (Professional Formatting)
      - name: Report Failure to Sentry
        if: failure()
        env:
          THRESHOLD: ${{ env.LATENCY_THRESHOLD }}
          URL: ${{ env.TARGET_URL }}
        run: |
          # Parse DSN (Using Org Secret)
          DSN="${{ secrets.SENTRY_DSN }}"
          SENTRY_KEY=$(echo $DSN | awk -F'[:@/]' '{print $4}')
          SENTRY_HOST=$(echo $DSN | awk -F'[:@/]' '{print $5}')
          SENTRY_PROJECT=$(echo $DSN | awk -F'[:@/]' '{print $6}')
      
          curl -X POST "https://$SENTRY_HOST/api/$SENTRY_PROJECT/store/" \
          -H "X-Sentry-Auth: Sentry sentry_version=7, sentry_key=$SENTRY_KEY, sentry_client=curl/1.0" \
          -H 'Content-Type: application/json' \
          -d '{
            "message": "Performance Regression: ${{ github.event.repository.name }}",
            "exception": {
              "values": [
                {
                  "type": "PerformanceThresholdError",
                  "value": "Application at '$URL' failed to meet the latency threshold of '$THRESHOLD'ms for Product ID: ${{ secrets.DEFECTDOJO_PRODUCT_ID }}."
                }
              ]
            },
            "level": "error",
            "fingerprint": ["${{ github.event.repository.name }}", "perf-failure"],
            "extra": {
              "repository": "${{ github.event.repository.name }}",
              "product_id": "${{ secrets.DEFECTDOJO_PRODUCT_ID }}",
              "threshold_limit": "'$THRESHOLD'ms",
              "run_url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            },
            "tags": {
              "repo": "${{ github.event.repository.name }}",
              "product_id": "${{ secrets.DEFECTDOJO_PRODUCT_ID }}"
            }
          }'

      - name: Upload Performance Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: live-site-performance-logs
          path: |
            k6-test.js
