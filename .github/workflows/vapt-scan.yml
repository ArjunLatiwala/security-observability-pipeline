name: Step 4 & 5 - Final Scalable Architecture

on:
  workflow_dispatch:

# 🌍 GLOBAL VARIABLES FOR THE WHOLE PIPELINE
env:
  TARGET_URL: 'https://husaintrivedi.site'

jobs:
  # ==========================================
  # JOB 1: STEP 4 (Security Scan + Wazuh)
  # ==========================================
  security_scan_job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: OWASP ZAP Full Scan
        uses: zaproxy/action-full-scan@v0.12.0
        with:
          # Uses global variable
          target: ${{ env.TARGET_URL }} 
          fail_action: false
          cmd_options: '-a -j -r report_html.html -J report_json.json'

      - name: Log to Wazuh (Future Stack)
        if: always()
        run: |
          echo "Sending security event for Product ID: ${{ secrets.DEFECTDOJO_PRODUCT_ID }}"

      - name: Upload Security Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vapt-report
          path: |
            report_html.html
            report_json.json

  # ==========================================
  # JOB 2: STEP 5 (Benchmarking + Sentry + Grafana)
  # ==========================================
  benchmarking_job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code 
        uses: actions/checkout@v4

      - name: Install Tools (AB & k6)
        run: |
          sudo apt-get update && sudo apt-get install -y apache2-utils gnupg ca-certificates
          curl -fsSL https://dl.k6.io/key.gpg | sudo gpg --dearmor -o /usr/share/keyrings/k6-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update && sudo apt-get install -y k6

      - name: Run Apache Bench Stress Test
        # Uses global variable
        run: ab -n 500 -c 10 ${{ env.TARGET_URL }}/ | tee stress-results.txt

      - name: Create k6 script
        run: |
          cat << 'EOF' > k6-test.js
          import http from 'k6/http';
          import { sleep, check } from 'k6';

          export const options = { 
            vus: 10, 
            duration: '10s',
            thresholds: { 
              http_req_duration: ['p(98)<2000'], 
              http_req_failed: ['rate<0.01'],
              checks: ['rate==1.0'],
              http_req_waiting: ['p(95)<1000']
            } 
          };

          export default function () {
            // This now pulls the URL from the shell environment
            let res = http.get('${{ env.TARGET_URL }}'); 
            check(res, { 'status is 200': (r) => r.status === 200 });
            sleep(1);
          }
          EOF

      - name: Run k6 Cloud Test
        run: |
          k6 run --out cloud \
          --name "${{ github.event.repository.name }}" \
          --tag product_id="${{ secrets.DEFECTDOJO_PRODUCT_ID }}" \
          k6-test.js
        env:
          K6_CLOUD_TOKEN: ${{ secrets.K6_CLOUD_TOKEN }}
          K6_CLOUD_PROJECT_ID: 7324608

      - name: Report to Sentry (Future Stack)
        if: failure()
        run: |
          echo "Performance Threshold Failed for Product ID: ${{ secrets.DEFECTDOJO_PRODUCT_ID }}"

      - name: Upload Performance Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: live-site-performance-logs
          path: |
            stress-results.txt
            k6-test.js
