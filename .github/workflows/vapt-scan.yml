name: Step 4 & 5 - Final Scalable Enterprise Architecture (WAZUH INTEGRATED - FIXED)

on:
  workflow_dispatch:

env:
  TARGET_URL: 'https://husaintrivedi.site'
  WAZUH_INDEXER_URL: 'https://35.200.203.148:8080'
  WAZUH_MANAGER_URL: 'https://35.200.203.148:55000'
  LATENCY_THRESHOLD: '10'       # 2 seconds P98
  EXPECTED_STATUS: '201'          # FIXED: Site returns 200, not 201
  ERROR_RATE_LIMIT: '0.0001'        # 5% error tolerance

jobs:
  security_vapt_job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: OWASP ZAP Full Scan
        uses: zaproxy/action-full-scan@v0.12.0
        with:
          target: ${{ env.TARGET_URL }}
          fail_action: false
          cmd_options: '-a -j -r report_html.html -J report_json.json'

      - name: Log Security Audit to Wazuh Indexer
        if: always()
        continue-on-error: true
        run: |
          TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          curl -k -s -X POST "${{ env.WAZUH_INDEXER_URL }}/pipeline-audit/_doc/" \
            -u "admin:${{ secrets.WAZUH_INDEXER_PASSWORD }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"timestamp\": \"$TIMESTAMP\",
              \"event_type\": \"SECURITY_VAPT_SCAN\",
              \"product_id\": \"${{ secrets.DEFECTDOJO_PRODUCT_ID }}\",
              \"repo\": \"${{ github.event.repository.name }}\",
              \"status\": \"${{ job.status }}\",
              \"run_url\": \"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"
            }"

  benchmarking_job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Tools (k6 & jq)
        run: sudo apt-get update && sudo apt-get install -y jq curl

      - name: Install k6
        run: |
          curl -fsSL https://dl.k6.io/key.gpg | sudo gpg --dearmor -o /usr/share/keyrings/k6-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update && sudo apt-get install -y k6

      - name: Run k6 Load Test
        id: k6_run
        continue-on-error: true
        run: |
          cat << EOF > k6-test.js
          import http from 'k6/http';
          import { check } from 'k6';
          
          export const options = { 
            vus: 5,
            duration: '30s',
            thresholds: { 
              'http_req_duration': ['p(98)<${{ env.LATENCY_THRESHOLD }}'],
              'http_req_failed': ['rate<${{ env.ERROR_RATE_LIMIT }}'] 
            } 
          };
          
          export default function () { 
            const res = http.get('${{ env.TARGET_URL }}');
            check(res, {
              'is status ${{ env.EXPECTED_STATUS }}': (r) => r.status === parseInt('${{ env.EXPECTED_STATUS }}'),
              'body has content': (r) => r.body.length > 0,
            });
          }
          EOF
          k6 run --summary-export=result.json k6-test.js

      - name: Log Performance Audit to Wazuh Indexer
        if: always()
        continue-on-error: true
        run: |
          TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          curl -k -s -X POST "${{ env.WAZUH_INDEXER_URL }}/pipeline-audit/_doc/" \
            -u "admin:${{ secrets.WAZUH_INDEXER_PASSWORD }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"timestamp\": \"$TIMESTAMP\",
              \"event_type\": \"PERFORMANCE_BENCHMARK\",
              \"product_id\": \"${{ secrets.DEFECTDOJO_PRODUCT_ID }}\",
              \"repo\": \"${{ github.event.repository.name }}\",
              \"status\": \"${{ job.status }}\",
              \"run_url\": \"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"
            }"

      - name: Trigger Wazuh Alert (FIXED - Proper Format)
        if: failure()
        continue-on-error: true
        run: |
          # Extract values with absolute safety
          ACTUAL_P98=$(jq -r '.metrics.http_req_duration.values["p(98)"] // 0' result.json 2>/dev/null | cut -d. -f1)
          ACTUAL_ERR=$(jq -r '.metrics.http_req_failed.values.rate // 0' result.json 2>/dev/null)
          STATUS_FAIL=$(jq -r '.metrics.checks.values.fails // 0' result.json 2>/dev/null)

          # Build breach list with proper formatting (no asterisks in the breach string itself)
          BREACHES=""
          
          # Check Latency
          if [ -n "$ACTUAL_P98" ] && [ "$ACTUAL_P98" -gt "${{ env.LATENCY_THRESHOLD }}" ]; then 
            BREACHES="${BREACHES}Performance Regression: Website responded at ${ACTUAL_P98}ms (Limit ${{ env.LATENCY_THRESHOLD }}ms), which is too slow for users. "
          fi
          
          # Check Error Rate
          IS_ERR=$(awk -v a="$ACTUAL_ERR" -v b="${{ env.ERROR_RATE_LIMIT }}" 'BEGIN{print(a>b?1:0)}' 2>/dev/null)
          if [ "$IS_ERR" -eq 1 ] 2>/dev/null; then
            BREACHES="${BREACHES}Reliability Failure: High error rate detected (${ACTUAL_ERR} > ${{ env.ERROR_RATE_LIMIT }}), indicating the server is unstable. "
          fi
          
          # Check Status Code
          if [ "$STATUS_FAIL" -gt 0 ] 2>/dev/null; then
            BREACHES="${BREACHES}Availability Failure: Status code mismatch detected (Expected ${{ env.EXPECTED_STATUS }}), indicating a logic error in deployment. "
          fi

          # Handle edge case
          if [ -z "$BREACHES" ]; then
            BREACHES="System Failure: The testing engine terminated unexpectedly or a network timeout occurred. "
          fi

          # Get Wazuh authentication token
          TOKEN=$(curl -u "wazuh-wui:MyS3cr37P450r.*-" -k -s -X POST \
            "${{ env.WAZUH_MANAGER_URL }}/security/user/authenticate" \
            -H "Content-Type: application/json" 2>/dev/null | jq -r '.data.token // empty' 2>/dev/null)

          if [ -z "$TOKEN" ] || [ "$TOKEN" == "null" ]; then
            echo "❌ Failed to get Wazuh token"
            exit 1
          fi

          # Send to Wazuh Manager using proper endpoint
          # Using /events endpoint with correct format
          RESPONSE=$(curl -k -s -w "\n%{http_code}" -X POST \
            "${{ env.WAZUH_MANAGER_URL }}/events" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d "{
              \"source\": \"github-actions\",
              \"rule.groups\": [\"pipeline_failure\"],
              \"data\": {
                \"repo\": \"${{ github.event.repository.name }}\",
                \"type\": \"Reliability_Audit\",
                \"prod_id\": \"${{ secrets.DEFECTDOJO_PRODUCT_ID }}\",
                \"breaches\": \"${BREACHES}\",
                \"space_id\": \"${{ secrets.GCHAT_SPACE_ID }}\",
                \"url\": \"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"
              }
            }" 2>&1)

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          RESPONSE_BODY=$(echo "$RESPONSE" | head -n-1)

          echo "HTTP Response Code: $HTTP_CODE"
          echo "Response: $RESPONSE_BODY"

          if [ "$HTTP_CODE" != "200" ] && [ "$HTTP_CODE" != "201" ]; then
            echo "⚠️  Wazuh event creation returned HTTP $HTTP_CODE - trying syslog fallback"
            
            # Fallback: Send via syslog
            SYSLOG_MSG="PIPELINE_ALERT_TRIGGER: repo=${{ github.event.repository.name }} type=Reliability_Audit prod_id=${{ secrets.DEFECTDOJO_PRODUCT_ID }} breaches='${BREACHES}' space_id=${{ secrets.GCHAT_SPACE_ID }} url=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            
            echo "$SYSLOG_MSG" | nc -w 2 35.200.203.148 514 2>/dev/null || echo "⚠️  Syslog fallback also failed"
          else
            echo "✅ Event sent to Wazuh successfully"
          fi
          
          exit 1

      - name: Report Failure to Sentry
        if: failure()
        continue-on-error: true
        run: |
          DSN="${{ secrets.SENTRY_DSN }}"
          if [ -z "$DSN" ]; then
            echo "⚠️  SENTRY_DSN not configured"
            exit 0
          fi
          
          SENTRY_KEY=$(echo $DSN | awk -F'[:@/]' '{print $4}')
          SENTRY_HOST=$(echo $DSN | awk -F'[:@/]' '{print $5}')
          PROJECT_ID=$(echo $DSN | awk -F'[:@/]' '{print $6}')
          
          curl -X POST "https://$SENTRY_HOST/api/$PROJECT_ID/store/" \
            -H "X-Sentry-Auth: Sentry sentry_version=7, sentry_key=$SENTRY_KEY, sentry_client=curl/1.0" \
            -H 'Content-Type: application/json' \
            -d "{\"message\": \"Regression: ${{ github.event.repository.name }}\", \"level\": \"error\"}" \
            --connect-timeout 10 \
            --max-time 20 2>/dev/null || echo "⚠️  Sentry notification failed"

      - name: Upload Benchmarking Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: performance-logs
          path: |
            result.json
            k6-test.js
