name: Step 4 & 5 - Professional DevSecOps Observability Pipeline

on:
  workflow_dispatch:

# 🌍 GLOBAL CONFIGURATION
env:
  TARGET_URL: 'https://husaintrivedi.site'
  LATENCY_THRESHOLD: '10' 

jobs:
  # ==========================================
  # JOB 1: STEP 4 - Deep Security (VAPT)
  # ==========================================
  security_vapt_job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: OWASP ZAP Full Scan
        uses: zaproxy/action-full-scan@v0.12.0
        with:
          target: ${{ env.TARGET_URL }}
          fail_action: false
          cmd_options: '-a -j -r report_html.html -J report_json.json'

      - name: Log Security Event to Wazuh
        if: always()
        continue-on-error: true
        run: |
          TOKEN=$(curl -u "${{ secrets.WAZUH_API_USER }}:${{ secrets.WAZUH_API_PASSWORD }}" -k -s -X GET "${{ secrets.WAZUH_URL }}/security/user/authenticate" | jq -r .data.token)
          
          curl -k -s -X POST "${{ secrets.WAZUH_URL }}/syslog" \
          -H "Authorization: Bearer $TOKEN" \
          -H "Content-Type: application/json" \
          -d '{
            "product_id": "${{ secrets.DEFECTDOJO_PRODUCT_ID }}",
            "repo": "${{ github.event.repository.name }}",
            "event_type": "SECURITY_VAPT_SCAN",
            "status": "${{ job.status }}",
            "message": "ZAP Full Scan completed for ${{ env.TARGET_URL }}"
          }'

      - name: Upload Security Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vapt-reports
          path: |
            report_html.html
            report_json.json

  # ==========================================
  # JOB 2: STEP 5 - Benchmarking (Stress & Load)
  # ==========================================
  benchmarking_job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code 
        uses: actions/checkout@v4

      - name: Setup Performance Tools
        run: |
          sudo apt-get update && sudo apt-get install -y apache2-utils jq
          curl -fsSL https://dl.k6.io/key.gpg | sudo gpg --dearmor -o /usr/share/keyrings/k6-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update && sudo apt-get install -y k6

      - name: Run Apache Bench Stress Test
        run: ab -n 500 -c 10 ${{ env.TARGET_URL }}/ | tee stress_results.txt

      # ✅ FIXED: Combined all environment variables into one block
      - name: Run k6 Load Test
        run: |
          cat << EOF > k6-test.js
          import http from 'k6/http';
          import { sleep, check } from 'k6';
          export const options = { 
            vus: 10, duration: '10s',
            thresholds: { 'http_req_duration': ['p(98)<$THRESHOLD'] } 
          };
          export default function () {
            let res = http.get('$URL'); 
            check(res, { 'status is 200': (r) => r.status === 200 });
            sleep(1);
          }
          EOF
          k6 run --out cloud --tag product_id="${{ secrets.DEFECTDOJO_PRODUCT_ID }}" k6-test.js
        env:
          THRESHOLD: ${{ env.LATENCY_THRESHOLD }}
          URL: ${{ env.TARGET_URL }}
          K6_CLOUD_TOKEN: ${{ secrets.K6_CLOUD_TOKEN }}
          K6_CLOUD_PROJECT_ID: 7324608
          K6_CLOUD_NAME: "${{ github.event.repository.name }}"
      
      - name: Test Wazuh Connectivity
        continue-on-error: true
        run: |
          curl -k -sv --connect-timeout 10 \
          "${{ secrets.WAZUH_URL }}/security/user/authenticate" 2>&1 | head -30
          
      - name: Log Performance Event to Wazuh
        if: always()
        continue-on-error: true
        run: |
          TOKEN=$(curl -u "${{ secrets.WAZUH_API_USER }}:${{ secrets.WAZUH_API_PASSWORD }}" \
            -k -s --connect-timeout 10 --max-time 15 \
            -X POST "${{ secrets.WAZUH_URL }}/security/user/authenticate" \
            | jq -r '.data.token // "AUTH_FAILED"')
      
          echo "Token status: $TOKEN"
      
          if [ "$TOKEN" = "AUTH_FAILED" ] || [ -z "$TOKEN" ]; then
            echo "⚠️ Wazuh auth failed — skipping"
            exit 0
          fi
      
          curl -k -s --connect-timeout 10 --max-time 15 \
          -X POST "${{ secrets.WAZUH_URL }}/events" \
          -H "Authorization: Bearer $TOKEN" \
          -H "Content-Type: application/json" \
          -d '{
            "events": [{
              "event_type": "PERFORMANCE_BENCHMARK",
              "status": "${{ job.status }}",
              "repo": "${{ github.event.repository.name }}",
              "threshold": "${{ env.LATENCY_THRESHOLD }}ms"
            }]
          }'

      - name: Report Failure to Sentry
        if: failure()
        env:
          THRESHOLD: ${{ env.LATENCY_THRESHOLD }}
          URL: ${{ env.TARGET_URL }}
        run: |
          DSN="${{ secrets.SENTRY_DSN }}"
          SENTRY_KEY=$(echo $DSN | awk -F'[:@/]' '{print $4}')
          SENTRY_HOST=$(echo $DSN | awk -F'[:@/]' '{print $5}')
          SENTRY_PROJECT=$(echo $DSN | awk -F'[:@/]' '{print $6}')
      
          curl -X POST "https://$SENTRY_HOST/api/$SENTRY_PROJECT/store/" \
          -H "X-Sentry-Auth: Sentry sentry_version=7, sentry_key=$SENTRY_KEY, sentry_client=curl/1.0" \
          -H 'Content-Type: application/json' \
          -d '{
            "message": "Performance Regression: ${{ github.event.repository.name }}",
            "exception": {
              "values": [
                {
                  "type": "PerformanceThresholdError",
                  "value": "Application at '$URL' failed to meet the latency threshold of '$THRESHOLD'ms for Product ID: ${{ secrets.DEFECTDOJO_PRODUCT_ID }}."
                }
              ]
            },
            "level": "error",
            "fingerprint": ["${{ github.event.repository.name }}", "perf-failure"],
            "tags": {
              "repo": "${{ github.event.repository.name }}",
              "product_id": "${{ secrets.DEFECTDOJO_PRODUCT_ID }}"
            }
          }'

      - name: Upload Benchmarking Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: performance-logs
          path: |
            stress_results.txt
            k6-test.js
