name: Step 4 & 5 - Live Site Security & Benchmarking

on:
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  vapt_benchmarking_job:
    runs-on: ubuntu-latest
    # REMOVED: services block (Juice Shop is gone)

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # ==========================================
      # STEP 4: SECURITY (Full Scan on Live Site)
      # ==========================================
      - name: OWASP ZAP Full Scan
        # Note: I changed 'baseline' to 'full-scan' per your request
        uses: zaproxy/action-full-scan@v0.12.0 
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          target: 'https://husaintrivedi.site' 
          fail_action: false

      # ==========================================
      # STEP 5: BENCHMARKING (Live Site)
      # ==========================================
      
      - name: Install Apache Bench
        run: sudo apt-get update && sudo apt-get install -y apache2-utils

      - name: Run Apache Bench Stress Test
        # CHANGE: Pointing to the live site
        run: ab -n 500 -c 10 https://husaintrivedi.site/ | tee stress-results.txt

      - name: Create k6 script
        run: |
          echo "import http from 'k6/http';
          import { sleep, check } from 'k6';
          export const options = { 
            vus: 10, 
            duration: '10s',
            thresholds: { http_req_duration: ['p(95)<2000'] } 
          };
          export default function () {
            // CHANGE: Pointing k6 to the live site
            let res = http.get('https://husaintrivedi.site'); 
            check(res, { 'status is 200': (r) => r.status === 200 });
            sleep(1);
          }" > k6-test.js

      - name: Run k6 Load Test
        uses: grafana/k6-action@v0.3.1
        with:
          filename: k6-test.js

      - name: Upload Performance Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: live-site-performance-results
          path: |
            stress-results.txt
            k6-test.js
